<script type="text/babel">
const {useState,useEffect,useMemo} = React;

/* ═══════════════════════════════════════════════════════════
   🔥 FIREBASE YAPILANDIRMASI
   
   Aşağıdaki bilgileri Firebase Console'dan al:
   1. https://console.firebase.google.com
   2. Proje Ayarları → Genel → Web uygulaması
   3. firebaseConfig bilgilerini buraya yapıştır
   
   Boş bırakırsan uygulama çevrimdışı (localStorage) çalışır.
   ═══════════════════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey:            "",
  authDomain:        "",
  projectId:         "",
  storageBucket:     "",
  messagingSenderId: "",
  appId:             "",
};

// ── Firebase Init ──
let db=null,fbOK=false;
try{
  if(FIREBASE_CONFIG.apiKey&&FIREBASE_CONFIG.apiKey.length>5){
    firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.firestore();
    fbOK=true;
  }
}catch(e){console.warn("Firebase yok:",e)}

// ── Firestore ──
function fbSub(col,order,cb){if(!fbOK)return()=>{};return db.collection(col).orderBy(order.f,order.d).onSnapshot(s=>cb(s.docs.map(d=>{const dt=d.data();return{id:d.id,...dt,createdAt:dt.createdAt?.toDate?.()?dt.createdAt.toDate().toISOString():dt.createdAt}})),e=>console.error(e))}
async function fbAdd(col,data){if(!fbOK)return null;const{id,...d}=data;d.createdAt=firebase.firestore.FieldValue.serverTimestamp();d.updatedAt=firebase.firestore.FieldValue.serverTimestamp();return(await db.collection(col).add(d)).id}
async function fbUp(col,did,data){if(!fbOK)return;const{id,...d}=data;d.updatedAt=firebase.firestore.FieldValue.serverTimestamp();await db.collection(col).doc(did).update(d)}
async function fbDel(col,did){if(!fbOK)return;await db.collection(col).doc(did).delete()}

// ── Theme (iOS) ──
const T={bg:"#f2f2f7",card:"#fff",press:"#e8e8ed",sep:"rgba(60,60,67,.12)",lbl:"#000",lbl2:"#3c3c43cc",lbl3:"#3c3c4399",lbl4:"#3c3c434d",blue:"#007aff",green:"#34c759",orange:"#ff9500",red:"#ff3b30",purple:"#af52de",teal:"#5ac8fa",indigo:"#5856d6",fill:"rgba(120,120,128,.2)",fill2:"rgba(120,120,128,.16)",nav:"rgba(249,249,249,.94)",sheet:"#fff"};
const P={critical:{l:"Kritik",c:T.red,i:"🔴",s:0},high:{l:"Yüksek",c:T.orange,i:"🟠",s:1},medium:{l:"Orta",c:T.blue,i:"🔵",s:2},low:{l:"Düşük",c:T.green,i:"🟢",s:3}};
const ST={todo:{l:"Bekliyor",c:"#8e8e93",i:"○"},inprogress:{l:"Devam Ediyor",c:T.blue,i:"◐"},review:{l:"İnceleme",c:T.purple,i:"◑"},done:{l:"Tamamlandı",c:T.green,i:"●"}};
const CATS=["Sunucu & Altyapı","Veritabanı","Yazılım Geliştirme","Ağ & Güvenlik","Kullanıcı Destek","Raporlama & BDDK","Dijitalleşme","Diğer"];

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const fmtD=d=>{if(!d)return"";return new Date(d).toLocaleDateString("tr-TR",{day:"numeric",month:"short"})};
const fmtDL=d=>{if(!d)return"";return new Date(d).toLocaleDateString("tr-TR",{day:"numeric",month:"long",year:"numeric"})};
const dLeft=d=>{if(!d)return null;return Math.ceil((new Date(d)-new Date())/864e5)};
const relD=d=>{const dl=dLeft(d);if(dl===null)return"";if(dl<-1)return Math.abs(dl)+" gün gecikmiş";if(dl===-1)return"Dün";if(dl===0)return"Bugün";if(dl===1)return"Yarın";if(dl<=7)return dl+" gün";return fmtD(d)};

const LS={g:(k,f)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):f}catch{return f}},s:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};

const SAMPLE=[
  {id:"s1",title:"BDDK Aylık Rapor Hazırlığı",description:"Regülatif raporların kontrol edilmesi ve BDDK portalına yüklenmesi",priority:"critical",status:"inprogress",category:"Raporlama & BDDK",assignee:"1",dueDate:"2026-04-16",createdAt:new Date().toISOString(),subtasks:[{id:"a",text:"Verilerin doğrulanması",done:true},{id:"b",text:"Rapor formatının kontrolü",done:false}]},
  {id:"s2",title:"SQL Server Yedekleme Kontrolü",description:"dbfactoring ve dbfactoring_log yedeklerinin doğrulanması (HFVM-SQLSRV)",priority:"high",status:"todo",category:"Veritabanı",assignee:"1",dueDate:"2026-04-15",createdAt:new Date().toISOString(),subtasks:[]},
  {id:"s3",title:"Mobil Uygulama Test Senaryoları",description:"QR scan → Infact → RatingPro → PowerCurve akışının test ortamında doğrulanması",priority:"high",status:"review",category:"Yazılım Geliştirme",assignee:"1",dueDate:"2026-04-20",createdAt:new Date().toISOString(),subtasks:[{id:"c",text:"QR scan testi",done:true},{id:"d",text:"RatingPro entegrasyonu",done:true},{id:"e",text:"PowerCurve karar motoru",done:false}]},
  {id:"s4",title:"Hyper-V Sunucu Bakımı",description:"Sanal sunucuların performans kontrolü ve güncelleme planlaması",priority:"medium",status:"todo",category:"Sunucu & Altyapı",assignee:"",dueDate:"2026-04-22",createdAt:new Date().toISOString(),subtasks:[]},
  {id:"s5",title:"Dijital Mizan Nihai Rapor",description:"Prometeia projesi kapanış belgelerinin tamamlanması",priority:"low",status:"done",category:"Dijitalleşme",assignee:"1",dueDate:"2026-04-05",createdAt:new Date().toISOString(),subtasks:[]},
  {id:"s6",title:"Elektronik Defter Tebliği Uyumu",description:"1 Temmuz 2025 tarihli tebliğ kapsamında gerekli aksiyonların planlanması",priority:"medium",status:"inprogress",category:"Dijitalleşme",assignee:"1",dueDate:"2026-05-01",createdAt:new Date().toISOString(),subtasks:[{id:"f",text:"Tebliğ gereksinimlerinin analizi",done:true},{id:"g",text:"BIS Infact entegrasyonu",done:false}]},
];
const DTEAM=[{id:"1",name:"Cengiz Gülcan",role:"IT Yönetici"}];

// ═══════ UI COMPONENTS ═══════

const h=React.createElement;

function Ring({p=0,sz=24,sw=3,cl=T.blue}){
  const r=(sz-sw)/2,c=2*Math.PI*r;
  return h("svg",{width:sz,height:sz,style:{transform:"rotate(-90deg)"}},
    h("circle",{cx:sz/2,cy:sz/2,r,fill:"none",stroke:T.fill,strokeWidth:sw}),
    h("circle",{cx:sz/2,cy:sz/2,r,fill:"none",stroke:cl,strokeWidth:sw,strokeDasharray:c,strokeDashoffset:c*(1-p),strokeLinecap:"round",style:{transition:"stroke-dashoffset .5s"}}));
}

function Av({name,sz=32}){
  const ini=name.split(" ").map(n=>n[0]).join("").slice(0,2);
  const hu=name.split("").reduce((a,c)=>a+c.charCodeAt(0),0)%360;
  return h("div",{style:{width:sz,height:sz,borderRadius:"50%",background:`linear-gradient(135deg,hsl(${hu},50%,55%),hsl(${hu+30},55%,45%))`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:sz*.38,fontWeight:600,flexShrink:0}},ini);
}

function Bdg({n,cl=T.red}){
  if(!n)return null;
  return h("span",{style:{background:cl,color:"#fff",borderRadius:10,fontSize:13,fontWeight:600,minWidth:20,height:20,display:"inline-flex",alignItems:"center",justifyContent:"center",padding:"0 6px"}},n);
}

function Seg({opts,val,onChange}){
  return h("div",{style:{display:"flex",background:T.fill,borderRadius:8,padding:2}},
    opts.map(o=>h("button",{key:o.v,onClick:()=>onChange(o.v),style:{flex:1,padding:"6px 6px",borderRadius:7,border:"none",background:val===o.v?T.card:"transparent",color:T.lbl,fontSize:12.5,fontWeight:val===o.v?600:400,fontFamily:"inherit",cursor:"pointer",boxShadow:val===o.v?"0 1px 4px rgba(0,0,0,.08)":"none",whiteSpace:"nowrap",transition:"all .15s"}},o.l)));
}

function NavB({title,large,right}){
  return h("div",{style:{position:"sticky",top:0,zIndex:100,background:T.nav,backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderBottom:`.5px solid ${T.sep}`,padding:"env(safe-area-inset-top,0) 16px 0"}},
    h("div",{style:{height:44,display:"flex",alignItems:"center",justifyContent:"space-between"}},
      h("div",{style:{minWidth:44}}),
      !large&&h("span",{style:{fontSize:17,fontWeight:600}},title),
      h("div",{style:{minWidth:44,textAlign:"right"}},
        right&&h("button",{onClick:right.fn,style:{background:"none",border:"none",color:T.blue,fontSize:28,cursor:"pointer",fontWeight:300,fontFamily:"inherit",padding:0}},right.ic))),
    large&&h("div",{style:{padding:"0 0 8px"}},h("h1",{style:{margin:0,fontSize:34,fontWeight:700,letterSpacing:.4}},title)));
}

function Grp(props){
  const {header,children}=props;
  return h("div",{style:{margin:"0 16px 20px"}},
    header&&h("div",{style:{fontSize:13,color:T.lbl2,textTransform:"uppercase",padding:"0 16px 6px",letterSpacing:-.1}},header),
    h("div",{style:{background:T.card,borderRadius:10,overflow:"hidden"}},children));
}

function Cell({label,detail,icon,icBg,chevron,destructive,onPress,trailing,sub}){
  const[pr,setPr]=useState(false);
  return h("div",{onClick:onPress,onPointerDown:()=>setPr(true),onPointerUp:()=>setPr(false),onPointerLeave:()=>setPr(false),
    style:{display:"flex",alignItems:"center",gap:12,padding:"11px 16px",minHeight:44,background:pr&&onPress?T.press:T.card,cursor:onPress?"pointer":"default",borderBottom:`.5px solid ${T.sep}`,transition:"background .1s"}},
    icon&&h("div",{style:{width:29,height:29,borderRadius:6,background:icBg||T.blue,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0,color:"#fff"}},icon),
    h("div",{style:{flex:1,minWidth:0}},
      h("div",{style:{fontSize:17,color:destructive?T.red:T.lbl,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},label),
      sub&&h("div",{style:{fontSize:13,color:T.lbl2,marginTop:1}},sub)),
    trailing,detail&&h("span",{style:{fontSize:17,color:T.lbl2}},detail),
    chevron&&h("span",{style:{color:T.lbl4,fontSize:18}},"›"));
}

function Sheet({title,onClose,rightAct,children}){
  return h("div",{style:{position:"fixed",inset:0,zIndex:1e3,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"flex-end",justifyContent:"center",animation:"fadeIn .2s"},onClick:onClose},
    h("div",{onClick:e=>e.stopPropagation(),style:{background:T.sheet,width:"100%",maxWidth:600,borderRadius:"14px 14px 0 0",maxHeight:"92vh",overflow:"hidden",display:"flex",flexDirection:"column",animation:"slideUp .35s cubic-bezier(.32,.72,0,1)"}},
      h("div",{style:{display:"flex",justifyContent:"center",padding:"8px 0 4px"}},h("div",{style:{width:36,height:5,borderRadius:3,background:T.fill}})),
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 16px 12px",borderBottom:`.5px solid ${T.sep}`}},
        h("button",{onClick:onClose,style:{background:"none",border:"none",color:T.blue,fontSize:17,fontFamily:"inherit",cursor:"pointer",minWidth:60}},"İptal"),
        h("span",{style:{fontSize:17,fontWeight:600}},title),
        h("div",{style:{minWidth:60,textAlign:"right"}},
          rightAct&&h("button",{onClick:rightAct.fn,disabled:rightAct.dis,style:{background:"none",border:"none",color:rightAct.dis?T.lbl3:T.blue,fontSize:17,fontWeight:600,fontFamily:"inherit",cursor:rightAct.dis?"default":"pointer"}},rightAct.l))),
      h("div",{style:{flex:1,overflow:"auto",WebkitOverflowScrolling:"touch"}},children)));
}

function FF({label,children}){
  return h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 16px",minHeight:44,borderBottom:`.5px solid ${T.sep}`,background:T.card}},
    h("span",{style:{fontSize:17,flexShrink:0,marginRight:12}},label),
    h("div",{style:{flex:1,display:"flex",justifyContent:"flex-end"}},children));
}

function Pk({value,onChange,opts}){
  return h("select",{value,onChange:e=>onChange(e.target.value),style:{border:"none",background:"none",outline:"none",fontSize:17,color:T.blue,fontFamily:"inherit",direction:"rtl",cursor:"pointer",appearance:"none",maxWidth:180}},
    opts.map(o=>h("option",{key:o.v,value:o.v},o.l)));
}

// ═══════ TASK FORM ═══════
function TaskForm({task,team,onSave,onClose}){
  const ed=!!task;
  const[f,setF]=useState(task||{title:"",description:"",priority:"medium",status:"todo",category:CATS[0],assignee:"",dueDate:"",createdAt:new Date().toISOString(),subtasks:[]});
  const[ns,setNs]=useState("");
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const addS=()=>{if(!ns.trim())return;s("subtasks",[...(f.subtasks||[]),{id:uid(),text:ns.trim(),done:false}]);setNs("")};

  return h(Sheet,{title:ed?"Görevi Düzenle":"Yeni Görev",onClose,rightAct:{l:ed?"Kaydet":"Ekle",fn:()=>f.title.trim()&&onSave(f),dis:!f.title.trim()}},
    h("div",{style:{padding:"16px 0"}},
      h(Grp,null,
        h("div",{style:{padding:"11px 16px",borderBottom:`.5px solid ${T.sep}`}},h("input",{value:f.title,onChange:e=>s("title",e.target.value),placeholder:"Görev başlığı",style:{border:"none",background:"none",outline:"none",width:"100%",fontSize:17,fontFamily:"inherit",fontWeight:500}})),
        h("div",{style:{padding:"11px 16px"}},h("textarea",{value:f.description,onChange:e=>s("description",e.target.value),placeholder:"Açıklama...",rows:3,style:{border:"none",background:"none",outline:"none",width:"100%",fontSize:15,fontFamily:"inherit",resize:"none"}}))),
      h(Grp,{header:"Detaylar"},
        h(FF,{label:"Öncelik"},h(Pk,{value:f.priority,onChange:v=>s("priority",v),opts:Object.entries(P).map(([k,v])=>({v:k,l:v.i+" "+v.l}))})),
        h(FF,{label:"Durum"},h(Pk,{value:f.status,onChange:v=>s("status",v),opts:Object.entries(ST).map(([k,v])=>({v:k,l:v.l}))})),
        h(FF,{label:"Kategori"},h(Pk,{value:f.category,onChange:v=>s("category",v),opts:CATS.map(c=>({v:c,l:c}))})),
        h(FF,{label:"Atanan"},h(Pk,{value:f.assignee,onChange:v=>s("assignee",v),opts:[{v:"",l:"Seçilmedi"},...team.map(t=>({v:t.id,l:t.name}))]})),
        h(FF,{label:"Tarih"},h("input",{type:"date",value:f.dueDate,onChange:e=>s("dueDate",e.target.value),style:{border:"none",background:"none",outline:"none",fontSize:17,color:T.blue,fontFamily:"inherit"}}))),
      h(Grp,{header:"Alt Görevler"},
        (f.subtasks||[]).map(st=>
          h("div",{key:st.id,style:{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",borderBottom:`.5px solid ${T.sep}`}},
            h("button",{onClick:()=>s("subtasks",f.subtasks.map(x=>x.id===st.id?{...x,done:!x.done}:x)),style:{width:22,height:22,borderRadius:"50%",border:st.done?"none":`2px solid ${T.lbl3}`,background:st.done?T.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,color:"#fff",fontSize:13,padding:0}},st.done&&"✓"),
            h("span",{style:{flex:1,fontSize:17,color:st.done?T.lbl3:T.lbl,textDecoration:st.done?"line-through":"none"}},st.text),
            h("button",{onClick:()=>s("subtasks",f.subtasks.filter(x=>x.id!==st.id)),style:{background:"none",border:"none",color:T.red,fontSize:18,cursor:"pointer"}},"−"))),
        h("div",{style:{display:"flex",alignItems:"center",gap:8,padding:"8px 16px"}},
          h("input",{value:ns,onChange:e=>setNs(e.target.value),onKeyDown:e=>e.key==="Enter"&&addS(),placeholder:"Alt görev ekle...",style:{border:"none",background:"none",outline:"none",width:"100%",fontSize:17,fontFamily:"inherit"}}),
          ns.trim()&&h("button",{onClick:addS,style:{background:T.blue,color:"#fff",border:"none",borderRadius:"50%",width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:16,fontWeight:700,flexShrink:0}},"+"))
      ),
      ed&&h(Grp,null,h(Cell,{label:"Görevi Sil",destructive:true,onPress:()=>onSave(null)})),
      h("div",{style:{height:40}})));
}

// ═══════ TEAM SHEET ═══════
function TeamSheet({team,onAdd,onDel,onClose}){
  const[n,sN]=useState(""),[r,sR]=useState("");
  const add=()=>{if(!n.trim())return;onAdd({name:n.trim(),role:r.trim()||"Ekip Üyesi"});sN("");sR("")};
  return h(Sheet,{title:"Ekip Yönetimi",onClose},
    h("div",{style:{padding:"16px 0"}},
      h(Grp,{header:team.length+" Üye"},team.map(m=>
        h("div",{key:m.id,style:{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",borderBottom:`.5px solid ${T.sep}`}},
          h(Av,{name:m.name,sz:36}),h("div",{style:{flex:1}},h("div",{style:{fontSize:17}},m.name),h("div",{style:{fontSize:13,color:T.lbl2}},m.role)),
          h("button",{onClick:()=>onDel(m.id),style:{background:"none",border:"none",color:T.red,fontSize:20,cursor:"pointer"}},"−")))),
      h(Grp,{header:"Yeni Üye"},
        h(FF,{label:"Ad Soyad"},h("input",{value:n,onChange:e=>sN(e.target.value),placeholder:"İsim",style:{border:"none",background:"none",outline:"none",fontSize:17,textAlign:"right",fontFamily:"inherit",width:"100%"}})),
        h(FF,{label:"Rol"},h("input",{value:r,onChange:e=>sR(e.target.value),onKeyDown:e=>e.key==="Enter"&&add(),placeholder:"Örn: Yazılımcı",style:{border:"none",background:"none",outline:"none",fontSize:17,textAlign:"right",fontFamily:"inherit",width:"100%"}})),
        h("div",{style:{padding:16}},h("button",{onClick:add,disabled:!n.trim(),style:{width:"100%",padding:12,borderRadius:10,border:"none",background:n.trim()?T.blue:T.fill,color:n.trim()?"#fff":T.lbl3,fontSize:17,fontWeight:600,fontFamily:"inherit",cursor:n.trim()?"pointer":"default"}},"Ekle")))));
}

// ═══════ TASK DETAIL ═══════
function TaskDetail({task,team,onEdit,onSC,onClose}){
  const p=P[task.priority],s=ST[task.status],a=team.find(t=>t.id===task.assignee),dl=dLeft(task.dueDate);
  const sd=(task.subtasks||[]).filter(s=>s.done).length,st=(task.subtasks||[]).length;
  return h(Sheet,{title:"Görev Detayı",onClose,rightAct:{l:"Düzenle",fn:()=>onEdit(task)}},
    h("div",{style:{padding:"16px 0"}},
      h("div",{style:{padding:"0 16px 16px"}},h("h2",{style:{margin:"0 0 6px",fontSize:22,fontWeight:700}},task.title),task.description&&h("p",{style:{margin:0,fontSize:15,color:T.lbl2,lineHeight:1.5}},task.description)),
      h("div",{style:{padding:"0 16px 16px"}},h(Seg,{opts:Object.entries(ST).map(([k,v])=>({v:k,l:v.l})),val:task.status,onChange:v=>onSC(task.id,v)})),
      h(Grp,{header:"Bilgiler"},
        h(Cell,{icon:"⚡",icBg:p.c,label:"Öncelik",detail:p.l}),
        h(Cell,{icon:"📁",icBg:T.teal,label:"Kategori",detail:task.category}),
        a&&h(Cell,{icon:"👤",icBg:T.indigo,label:"Atanan",detail:a.name}),
        task.dueDate&&h(Cell,{icon:"📅",icBg:dl<0?T.red:T.orange,label:"Son Tarih",detail:fmtDL(task.dueDate),trailing:dl!==null&&dl<0?h(Bdg,{n:"Gecikmiş"}):null})),
      st>0&&h(Grp,{header:`Alt Görevler — ${sd}/${st}`},(task.subtasks||[]).map(sub=>
        h("div",{key:sub.id,style:{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",borderBottom:`.5px solid ${T.sep}`}},
          h("div",{style:{width:22,height:22,borderRadius:"50%",border:sub.done?"none":`2px solid ${T.lbl3}`,background:sub.done?T.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13}},sub.done&&"✓"),
          h("span",{style:{fontSize:17,color:sub.done?T.lbl3:T.lbl,textDecoration:sub.done?"line-through":"none"}},sub.text))))));
}

// ═══════ TASK ROW ═══════
function TaskRow({task,team,onPress}){
  const[pr,sP]=useState(false);
  const p=P[task.priority],s=ST[task.status],a=team.find(t=>t.id===task.assignee),dl=dLeft(task.dueDate);
