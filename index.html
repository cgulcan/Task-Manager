<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT TaskMaster Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#2563eb', dark: '#0f172a', surface: '#f8fafc' }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f1f5f9; }
        .kanban-column { min-height: calc(100vh - 200px); }
        .sortable-ghost { opacity: 0.3; transform: scale(0.95); }
        .fc-event { cursor: pointer; padding: 2px 5px; border-radius: 4px; border: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        /* Yan Panel Animasyonu */
        #sidePanel { transition: transform 0.3s ease-in-out; }
        .panel-hidden { transform: translateX(100%); }
    </style>
</head>
<body class="text-slate-900 overflow-hidden">

    <nav class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center z-30 relative">
        <div class="flex items-center gap-8">
            <h1 class="text-xl font-black text-primary tracking-tighter">TASK<span class="text-dark">MASTER</span></h1>
            <div class="flex bg-slate-100 p-1 rounded-lg">
                <button onclick="switchView('kanban')" id="btnKanban" class="px-4 py-1.5 text-sm font-semibold rounded-md bg-white shadow-sm text-primary">Kanban</button>
                <button onclick="switchView('calendar')" id="btnCalendar" class="px-4 py-1.5 text-sm font-semibold rounded-md text-slate-500">Takvim</button>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="openNewTaskModal()" class="bg-primary hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Yeni Görev
            </button>
            <div class="w-9 h-9 rounded-full bg-slate-200 border border-slate-300 flex items-center justify-center font-bold text-xs">BT</div>
        </div>
    </nav>

    <main class="h-[calc(100vh-65px)] overflow-hidden relative">
        
        <div id="kanbanView" class="p-6 flex gap-6 overflow-x-auto h-full custom-scrollbar">
            <div class="w-80 shrink-0 flex flex-col">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="font-bold flex items-center gap-2 text-slate-600 uppercase text-xs tracking-wider">
                        <span class="w-2 h-2 rounded-full bg-slate-400"></span> Yapılacaklar
                    </h2>
                    <span class="todo-count bg-slate-200 text-slate-600 px-2 py-0.5 rounded text-[10px] font-bold">0</span>
                </div>
                <div id="todo-list" data-status="todo" class="kanban-column space-y-3"></div>
            </div>

            <div class="w-80 shrink-0 flex flex-col">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="font-bold flex items-center gap-2 text-blue-600 uppercase text-xs tracking-wider">
                        <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span> Devam Edenler
                    </h2>
                    <span class="inprogress-count bg-blue-100 text-blue-600 px-2 py-0.5 rounded text-[10px] font-bold">0</span>
                </div>
                <div id="inprogress-list" data-status="inprogress" class="kanban-column space-y-3"></div>
            </div>

            <div class="w-80 shrink-0 flex flex-col">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="font-bold flex items-center gap-2 text-emerald-600 uppercase text-xs tracking-wider">
                        <span class="w-2 h-2 rounded-full bg-emerald-500"></span> Tamamlandı
                    </h2>
                    <span class="done-count bg-emerald-100 text-emerald-600 px-2 py-0.5 rounded text-[10px] font-bold">0</span>
                </div>
                <div id="done-list" data-status="done" class="kanban-column space-y-3"></div>
            </div>
        </div>

        <div id="calendarView" class="hidden p-6 h-full bg-white">
            <div id="calendar" class="h-full"></div>
        </div>

        <div id="sidePanel" class="fixed top-0 right-0 w-[450px] h-full bg-white shadow-2xl z-50 panel-hidden border-l border-slate-200 flex flex-col">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <span id="panelTaskID" class="text-xs font-mono text-slate-400 font-bold">#000</span>
                <button onclick="closeSidePanel()" class="text-slate-400 hover:text-dark">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-8 flex-1 overflow-y-auto space-y-6">
                <input id="panelTitle" class="text-2xl font-bold w-full border-none outline-none focus:ring-0 text-slate-800" placeholder="Görev Başlığı">
                
                <div class="grid grid-cols-2 gap-4 text-sm">
                    <div>
                        <label class="block text-slate-400 mb-1 font-semibold uppercase text-[10px]">Durum</label>
                        <select id="panelStatus" class="w-full bg-slate-50 border border-slate-200 rounded-md p-2">
                            <option value="todo">Yapılacak</option>
                            <option value="inprogress">Devam Ediyor</option>
                            <option value="done">Tamamlandı</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-slate-400 mb-1 font-semibold uppercase text-[10px]">Bitiş Tarihi</label>
                        <input type="date" id="panelDate" class="w-full bg-slate-50 border border-slate-200 rounded-md p-2">
                    </div>
                </div>

                <div>
                    <label class="block text-slate-400 mb-1 font-semibold uppercase text-[10px]">Açıklama</label>
                    <textarea id="panelDesc" rows="6" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 outline-none focus:border-primary transition-all text-slate-600" placeholder="Görev detaylarını buraya yazın..."></textarea>
                </div>
            </div>
            <div class="p-6 border-t border-slate-100 bg-slate-50 flex justify-between">
                <button onclick="deleteCurrentTask()" class="text-red-500 font-bold text-sm hover:underline">Görevi Sil</button>
                <button onclick="savePanelChanges()" class="bg-dark text-white px-6 py-2 rounded-lg font-bold text-sm shadow-lg">Değişiklikleri Kaydet</button>
            </div>
        </div>

    </main>

    <div id="modalNewTask" class="hidden fixed inset-0 bg-dark/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl animate-in zoom-in duration-200">
            <h2 class="text-xl font-black mb-6">Yeni Görev Tanımla</h2>
            <div class="space-y-4">
                <input type="text" id="newTitle" placeholder="Görev Başlığı" class="w-full border p-3 rounded-xl outline-primary">
                <input type="date" id="newDate" class="w-full border p-3 rounded-xl outline-primary">
                <textarea id="newDesc" placeholder="Detaylar..." class="w-full border p-3 rounded-xl outline-primary"></textarea>
                <div class="flex gap-2 pt-2">
                    <button onclick="closeNewTaskModal()" class="flex-1 py-3 font-bold text-slate-400">Vazgeç</button>
                    <button onclick="createNewTask()" class="flex-1 py-3 bg-primary text-white rounded-xl font-bold shadow-lg">Ekle</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // VERİ YÖNETİMİ
        let tasks = JSON.parse(localStorage.getItem('tm_pro_v4')) || [
            { id: 'T-852', title: 'Veritabanı Optimizasyonu', desc: 'Index yapıları kontrol edilecek.', date: '2026-04-20', status: 'todo' },
            { id: 'T-853', title: 'API Güvenlik Testi', desc: 'JWT token süreleri revize edilecek.', date: '2026-04-18', status: 'inprogress' }
        ];

        let calendar;
        let activeTaskId = null;

        // BAŞLANGIÇ
        document.addEventListener('DOMContentLoaded', () => {
            renderKanban();
            initCalendar();
            initSortable();
        });

        // KANBAN RENDER
        function renderKanban() {
            const cols = { todo: 'todo-list', inprogress: 'inprogress-list', done: 'done-list' };
            Object.values(cols).forEach(id => document.getElementById(id).innerHTML = '');

            tasks.forEach(task => {
                const card = `
                    <div onclick="openSidePanel('${task.id}')" data-id="${task.id}" class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:border-primary cursor-pointer transition-all group">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-bold text-slate-400 font-mono">${task.id}</span>
                            <span class="text-[10px] bg-slate-100 px-2 py-0.5 rounded font-bold">${task.date}</span>
                        </div>
                        <h3 class="font-bold text-slate-800 text-sm mb-1 group-hover:text-primary transition-colors">${task.title}</h3>
                        <p class="text-xs text-slate-500 line-clamp-2">${task.desc}</p>
                    </div>`;
                document.getElementById(cols[task.status]).insertAdjacentHTML('beforeend', card);
            });

            updateCounts();
            if(calendar) calendar.refetchEvents();
        }

        function updateCounts() {
            ['todo', 'inprogress', 'done'].forEach(s => {
                document.querySelector(`.${s}-count`).innerText = tasks.filter(t => t.status === s).length;
            });
            localStorage.setItem('tm_pro_v4', JSON.stringify(tasks));
        }

        // SÜRÜKLE BIRAK
        function initSortable() {
            ['todo-list', 'inprogress-list', 'done-list'].forEach(id => {
                new Sortable(document.getElementById(id), {
                    group: 'tasks',
                    animation: 200,
                    ghostClass: 'sortable-ghost',
                    onEnd: (evt) => {
                        const id = evt.item.getAttribute('data-id');
                        const newStatus = evt.to.getAttribute('data-status');
                        const task = tasks.find(t => t.id === id);
                        task.status = newStatus;
                        updateCounts();
                        if(calendar) calendar.refetchEvents();
                    }
                });
            });
        }

        // TAKVİM AYARLARI
        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'tr',
                headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
                events: (info, successCallback) => {
                    const events = tasks.map(t => ({
                        id: t.id,
                        title: t.title,
                        start: t.date,
                        backgroundColor: t.status === 'done' ? '#10b981' : (t.status === 'inprogress' ? '#3b82f6' : '#94a3b8')
                    }));
                    successCallback(events);
                },
                eventClick: (info) => openSidePanel(info.event.id)
            });
            calendar.render();
        }

        // GÖRÜNÜM DEĞİŞTİRME
        function switchView(view) {
            if(view === 'kanban') {
                document.getElementById('kanbanView').classList.remove('hidden');
                document.getElementById('calendarView').classList.add('hidden');
                document.getElementById('btnKanban').classList.add('bg-white', 'shadow-sm', 'text-primary');
                document.getElementById('btnCalendar').classList.remove('bg-white', 'shadow-sm', 'text-primary');
            } else {
                document.getElementById('kanbanView').classList.add('hidden');
                document.getElementById('calendarView').classList.remove('hidden');
                document.getElementById('btnCalendar').classList.add('bg-white', 'shadow-sm', 'text-primary');
                document.getElementById('btnKanban').classList.remove('bg-white', 'shadow-sm', 'text-primary');
                setTimeout(() => calendar.render(), 10);
            }
        }

        // PANEL İŞLEMLERİ
        function openSidePanel(id) {
            activeTaskId = id;
            const task = tasks.find(t => t.id === id);
            document.getElementById('panelTaskID').innerText = task.id;
            document.getElementById('panelTitle').value = task.title;
            document.getElementById('panelDesc').value = task.desc;
            document.getElementById('panelStatus').value = task.status;
            document.getElementById('panelDate').value = task.date;
            document.getElementById('sidePanel').classList.remove('panel-hidden');
        }

        function closeSidePanel() {
            document.getElementById('sidePanel').classList.add('panel-hidden');
            activeTaskId = null;
        }

        function savePanelChanges() {
            const task = tasks.find(t => t.id === activeTaskId);
            task.title = document.getElementById('panelTitle').value;
            task.desc = document.getElementById('panelDesc').value;
            task.status = document.getElementById('panelStatus').value;
            task.date = document.getElementById('panelDate').value;
            closeSidePanel();
            renderKanban();
        }

        function deleteCurrentTask() {
            if(confirm('Bu görevi silmek istediğine emin misin?')) {
                tasks = tasks.filter(t => t.id !== activeTaskId);
                closeSidePanel();
                renderKanban();
            }
        }

        // YENİ GÖREV EKLEME
        function openNewTaskModal() { document.getElementById('modalNewTask').classList.remove('hidden'); }
        function closeNewTaskModal() { document.getElementById('modalNewTask').classList.add('hidden'); }

        function createNewTask() {
            const title = document.getElementById('newTitle').value;
            const date = document.getElementById('newDate').value;
            const desc = document.getElementById('newDesc').value;

            if(!title || !date) return alert('Başlık ve tarih zorunludur!');

            tasks.push({
                id: 'T-' + Math.floor(100 + Math.random()*900),
                title, desc, date, status: 'todo'
            });

            closeNewTaskModal();
            renderKanban();
            // Formu temizle
            document.getElementById('newTitle').value = '';
            document.getElementById('newDesc').value = '';
        }
    </script>
</body>
</html>
