<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT TaskMaster Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { elite: { 50: '#f8fafc', 600: '#2563eb', 900: '#0f172a' } }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f1f5f9; height: 100vh; overflow: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.4); }
        .kanban-column { min-height: 75vh; }
        .task-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #e2e8f0; }
        .task-card:hover { transform: translateY(-4px); border-color: #2563eb; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1); }
        .side-panel { transition: transform 0.4s ease-in-out; transform: translateX(100%); }
        .side-panel.open { transform: translateX(0); }
        .fc { border: none !important; }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-16 px-8 bg-white border-b border-slate-200 flex items-center justify-between z-40">
        <div class="flex items-center gap-8">
            <h1 class="text-xl font-extrabold text-elite-900 tracking-tighter">TASK<span class="text-elite-600">ELITE</span></h1>
            <div class="flex bg-slate-100 p-1 rounded-xl">
                <button onclick="switchView('kanban')" id="btnK" class="px-5 py-1.5 text-sm font-bold rounded-lg bg-white shadow-sm text-elite-600">Kanban</button>
                <button onclick="switchView('calendar')" id="btnC" class="px-5 py-1.5 text-sm font-bold rounded-lg text-slate-500">Takvim</button>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="openModal()" class="bg-elite-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl text-sm font-bold transition-all shadow-lg shadow-blue-500/20">+ Yeni Görev</button>
            <div class="w-10 h-10 rounded-full bg-slate-900 text-white flex items-center justify-center font-bold text-xs">BT</div>
        </div>
    </header>

    <main class="flex-1 relative overflow-hidden">
        
        <div id="kanbanView" class="p-8 h-full overflow-x-auto flex gap-8">
            <div class="w-80 shrink-0 flex flex-col">
                <div class="flex items-center justify-between mb-4 px-2">
                    <h2 class="font-bold text-slate-500 uppercase text-xs tracking-widest flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-slate-300"></span> Yapılacaklar
                    </h2>
                    <span id="todo-count" class="bg-white text-slate-500 px-2.5 py-0.5 rounded-full text-[10px] font-black border border-slate-200 shadow-sm">0</span>
                </div>
                <div id="todo-list" data-status="todo" class="kanban-column space-y-4 pr-1"></div>
            </div>

            <div class="w-80 shrink-0 flex flex-col">
                <div class="flex items-center justify-between mb-4 px-2">
                    <h2 class="font-bold text-blue-600 uppercase text-xs tracking-widest flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span> Devam Eden
                    </h2>
                    <span id="inprogress-count" class="bg-white text-blue-600 px-2.5 py-0.5 rounded-full text-[10px] font-black border border-blue-200 shadow-sm">0</span>
                </div>
                <div id="inprogress-list" data-status="inprogress" class="kanban-column space-y-4 pr-1"></div>
            </div>

            <div class="w-80 shrink-0 flex flex-col">
                <div class="flex items-center justify-between mb-4 px-2">
                    <h2 class="font-bold text-emerald-600 uppercase text-xs tracking-widest flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-500"></span> Tamamlandı
                    </h2>
                    <span id="done-count" class="bg-white text-emerald-600 px-2.5 py-0.5 rounded-full text-[10px] font-black border border-emerald-200 shadow-sm">0</span>
                </div>
                <div id="done-list" data-status="done" class="kanban-column space-y-4 pr-1"></div>
            </div>
        </div>

        <div id="calendarView" class="hidden p-8 h-full bg-white">
            <div id="calendar" class="h-full"></div>
        </div>

        <div id="sidePanel" class="side-panel fixed top-0 right-0 w-[480px] h-full bg-white shadow-2xl z-50 flex flex-col border-l border-slate-200">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <span id="pID" class="text-xs font-bold text-slate-300 font-mono tracking-tighter">#ID</span>
                <button onclick="closeSidePanel()" class="text-slate-400 hover:text-black transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="p-8 flex-1 overflow-y-auto space-y-6">
                <input id="pTitle" class="text-2xl font-bold w-full border-none outline-none focus:ring-0 text-slate-800" placeholder="Başlık Girin">
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-4 bg-slate-50 rounded-2xl">
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Durum</label>
                        <select id="pStatus" class="w-full bg-transparent font-bold text-sm text-slate-700 outline-none">
                            <option value="todo">Yapılacak</option>
                            <option value="inprogress">Devam Ediyor</option>
                            <option value="done">Tamamlandı</option>
                        </select>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-2xl">
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Bitiş Tarihi</label>
                        <input type="date" id="pDate" class="w-full bg-transparent font-bold text-sm text-slate-700 outline-none">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Görev Açıklaması</label>
                    <textarea id="pDesc" rows="10" class="w-full bg-slate-50 rounded-2xl p-4 outline-none border border-transparent focus:border-elite-600 transition-all text-slate-600" placeholder="Detaylar..."></textarea>
                </div>
            </div>
            <div class="p-6 border-t bg-slate-50 flex gap-4">
                <button onclick="deleteTask()" class="text-red-500 font-bold px-4">SİL</button>
                <button onclick="saveChanges()" class="flex-1 bg-slate-900 text-white py-3 rounded-xl font-bold shadow-xl active:scale-95 transition-all">DEĞİŞİKLİKLERİ KAYDET</button>
            </div>
        </div>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[32px] p-10 w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-black mb-6 text-slate-800">Yeni Görev</h2>
            <div class="space-y-4">
                <input type="text" id="nTitle" placeholder="Başlık" class="w-full bg-slate-100 border-none p-4 rounded-xl outline-elite-600">
                <input type="date" id="nDate" class="w-full bg-slate-100 border-none p-4 rounded-xl outline-elite-600">
                <textarea id="nDesc" placeholder="Açıklama" class="w-full bg-slate-100 border-none p-4 rounded-xl outline-elite-600"></textarea>
                <div class="flex gap-4 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-3 font-bold text-slate-400">İptal</button>
                    <button onclick="addTask()" class="flex-1 py-3 bg-elite-600 text-white rounded-xl font-bold shadow-lg">Oluştur</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tm_elite')) || [
            { id: 'T-101', title: 'Veritabanı Bakımı', desc: 'SQL Server index yapıları optimize edilecek.', date: '2026-04-20', status: 'todo' },
            { id: 'T-102', title: 'API Entegrasyonu', desc: 'Ödeme modülü için endpointler bağlanacak.', date: '2026-04-19', status: 'inprogress' }
        ];
        let calendar;
        let activeID = null;

        // BAŞLATMA
        document.addEventListener('DOMContentLoaded', () => {
            render();
            initCalendar();
            initDrag();
        });

        function render() {
            const lists = { todo: 'todo-list', inprogress: 'inprogress-list', done: 'done-list' };
            Object.values(lists).forEach(id => document.getElementById(id).innerHTML = '');

            tasks.forEach(t => {
                const card = `
                    <div onclick="openPanel('${t.id}')" data-id="${t.id}" class="task-card bg-white p-5 rounded-2xl shadow-sm cursor-pointer group">
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-[10px] font-bold text-slate-300 font-mono">${t.id}</span>
                            <span class="text-[10px] font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded-lg">${t.date}</span>
                        </div>
                        <h3 class="font-bold text-slate-800 text-sm mb-1 group-hover:text-elite-600 transition-colors">${t.title}</h3>
                        <p class="text-xs text-slate-400 line-clamp-2">${t.desc}</p>
                    </div>`;
                document.getElementById(lists[t.status]).insertAdjacentHTML('beforeend', card);
            });
            updateStats();
        }

        function updateStats() {
            ['todo', 'inprogress', 'done'].forEach(s => {
                document.getElementById(`${s}-count`).innerText = tasks.filter(t => t.status === s).length;
            });
            localStorage.setItem('tm_elite', JSON.stringify(tasks));
            if(calendar) calendar.refetchEvents();
        }

        function initDrag() {
            ['todo-list', 'inprogress-list', 'done-list'].forEach(id => {
                new Sortable(document.getElementById(id), {
                    group: 'tasks',
                    animation: 250,
                    onEnd: (e) => {
                        const task = tasks.find(t => t.id === e.item.getAttribute('data-id'));
                        task.status = e.to.getAttribute('data-status');
                        updateStats();
                    }
                });
            });
        }

        function initCalendar() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'tr',
                events: (info, success) => {
                    success(tasks.map(t => ({ id: t.id, title: t.title, start: t.date, color: t.status === 'done' ? '#10b981' : '#3b82f6' })));
                },
                eventClick: (info) => openPanel(info.event.id)
            });
            calendar.render();
        }

        function switchView(v) {
            document.getElementById('kanbanView').classList.toggle('hidden', v === 'calendar');
            document.getElementById('calendarView').classList.toggle('hidden', v === 'kanban');
            document.getElementById('btnK').className = v === 'kanban' ? 'px-5 py-1.5 text-sm font-bold rounded-lg bg-white shadow-sm text-elite-600' : 'px-5 py-1.5 text-sm font-bold rounded-lg text-slate-500';
            document.getElementById('btnC').className = v === 'calendar' ? 'px-5 py-1.5 text-sm font-bold rounded-lg bg-white shadow-sm text-elite-600' : 'px-5 py-1.5 text-sm font-bold rounded-lg text-slate-500';
            if(v === 'calendar') setTimeout(() => calendar.render(), 10);
        }

        function openPanel(id) {
            activeID = id;
            const t = tasks.find(x => x.id === id);
            document.getElementById('pID').innerText = t.id;
            document.getElementById('pTitle').value = t.title;
            document.getElementById('pStatus').value = t.status;
            document.getElementById('pDate').value = t.date;
            document.getElementById('pDesc').value = t.desc;
            document.getElementById('sidePanel').classList.add('open');
        }

        function closeSidePanel() { document.getElementById('sidePanel').classList.remove('open'); activeID = null; }

        function saveChanges() {
            const t = tasks.find(x => x.id === activeID);
            t.title = document.getElementById('pTitle').value;
            t.status = document.getElementById('pStatus').value;
            t.date = document.getElementById('pDate').value;
            t.desc = document.getElementById('pDesc').value;
            render(); closeSidePanel();
        }

        function deleteTask() {
            if(confirm('Silinsin mi?')) { tasks = tasks.filter(t => t.id !== activeID); render(); closeSidePanel(); }
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function addTask() {
            const title = document.getElementById('nTitle').value;
            const date = document.getElementById('nDate').value;
            if(!title || !date) return;
            tasks.push({ id: 'T-' + Math.floor(100 + Math.random()*900), title, date, desc: document.getElementById('nDesc').value, status: 'todo' });
            render(); closeModal();
        }
    </script>
</body>
</html>
