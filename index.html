<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HF IT">
<meta name="theme-color" content="#0f172a">
<title>HF IT - Kompakt Glass OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  /* --- IŞIK MODU --- */
  --bg-color: #f8fafc;
  --glass-bg: rgba(255, 255, 255, 0.65);
  --glass-border: rgba(255, 255, 255, 0.8);
  --glass-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
  --lbl: #0f172a; --lbl2: #475569; --lbl3: #94a3b8;
  --accent: #2563eb; --accent-glow: 0 4px 12px rgba(37, 99, 235, 0.3);
  --fill: rgba(0, 0, 0, 0.04); --sep: rgba(0, 0, 0, 0.06);
  
  /* Görev Renkleri */
  --c-critical: #ef4444; --c-high: #f59e0b; --c-medium: #3b82f6; --c-low: #10b981;
  --blue-bg: rgba(59, 130, 246, 0.1);
}

body.dark {
  /* --- KOYU MOD (DERİN LACİVERT) --- */
  --bg-color: #020617;
  --glass-bg: rgba(15, 23, 42, 0.6);
  --glass-border: rgba(255, 255, 255, 0.06);
  --glass-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
  --lbl: #f8fafc; --lbl2: #cbd5e1; --lbl3: #64748b;
  --accent: #38bdf8; --accent-glow: 0 0 15px rgba(56, 189, 248, 0.3);
  --fill: rgba(255, 255, 255, 0.05); --sep: rgba(255, 255, 255, 0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100dvh; width: 100vw; overflow: hidden; background-color: var(--bg-color); font-family: 'Inter', sans-serif; color: var(--lbl); letter-spacing: -0.01em; transition: 0.4s; }

/* Arka Plan Dekorasyonu */
.bg-decor { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
.bg-decor::before { content: ''; position: absolute; top: -10%; left: -10%; width: 40%; height: 40%; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); opacity: 0.15; filter: blur(60px); }

#app { display: flex; flex-direction: column; height: 100dvh; max-width: 1200px; margin: 0 auto; }
.content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; -webkit-overflow-scrolling: touch; }

/* Kompakt Glass Panel */
.glass { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); border-radius: 20px; }

/* HEADER */
.hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding: 10px 4px; }
.hdr h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.03em; }
.hdr .ovr { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--lbl3); font-weight: 700; margin-bottom: 2px;}
.ibtn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 12px; color: var(--lbl); transition: 0.2s; }
.ibtn:active { transform: scale(0.9); }

/* DASHBOARD GRID (TAK TAKVİM SOLDA GÖREVLER SAĞDA) */
.dash-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
@media (min-width: 850px) {
  .dash-grid { grid-template-columns: 450px 1fr; align-items: start; }
}

/* TAKVİM TASARIMI */
.cal-box { padding: 16px; border-radius: 24px; }
.cal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.cal-hdr h2 { font-size: 16px; font-weight: 800; }
.cal-nav { display: flex; gap: 8px; }
.cal-nav button { width: 32px; height: 32px; border-radius: 10px; background: var(--fill); color: var(--lbl); cursor: pointer; font-weight: bold; }

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-day-label { text-align: center; font-size: 10px; font-weight: 800; color: var(--lbl3); text-transform: uppercase; margin-bottom: 8px; }
.cal-cell { min-height: 50px; padding: 4px; border-radius: 10px; background: rgba(255,255,255,0.02); display: flex; flex-direction: column; align-items: center; position: relative; border: 1px solid transparent; transition: 0.2s; cursor: pointer; }
.cal-cell:hover { background: var(--fill); }
.cal-cell.today { border-color: var(--accent); background: var(--blue-bg); }
.cal-cell.empty { opacity: 0; pointer-events: none; }
.cal-cell span { font-size: 12px; font-weight: 700; margin-bottom: 4px; }

/* Takvim İçi Görev Başlıkları */
.cal-task-list { width: 100%; display: flex; flex-direction: column; gap: 2px; }
.cal-task-item { font-size: 8px; padding: 1px 4px; border-radius: 3px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; width: 100%; text-align: center; }

/* GÖREV LİSTESİ TASARIMI */
.task-box { }
.trow { padding: 14px 18px; border-bottom: 1px solid var(--sep); cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; position: relative; }
.trow:last-child { border-bottom: none; }
.trow:active { background: var(--fill); }
.trow-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; color: var(--lbl); }
.trow-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--lbl2); font-weight: 500; }
.pri-tag { font-size: 9px; padding: 2px 8px; border-radius: 5px; font-weight: 800; text-transform: uppercase; }

/* FILTRELER */
.dash-filters { display: flex; gap: 10px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.df-select { flex: 1; min-width: 120px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 10px 12px; color: var(--lbl); font-size: 12px; font-weight: 700; outline: none; }

/* TABBAR */
.tabbar-wrap { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: center; padding: 0 20px calc(env(safe-area-inset-bottom, 16px) + 12px); pointer-events: none; z-index: 100; }
.tabbar { pointer-events: auto; width: 100%; max-width: 400px; padding: 6px; display: flex; justify-content: space-around; border-radius: 24px; }
.tab-btn { padding: 8px 20px; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--lbl3); font-size: 10px; font-weight: 700; cursor: pointer; border-radius: 18px; transition: 0.3s; }
.tab-btn.active { color: var(--accent); background: var(--fill); }
.tab-btn svg { width: 22px; height: 22px; stroke-width: 2.2; }

/* FAB */
.fab { position: fixed; bottom: calc(env(safe-area-inset-bottom, 16px) + 80px); right: 24px; width: 56px; height: 56px; border-radius: 18px; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: var(--accent-glow); cursor: pointer; z-index: 90; transition: 0.2s; }
.fab:active { transform: scale(0.85); }

/* ANIMASYONLAR */
@keyframes fi { from { opacity: 0; } to { opacity: 1; } }
@keyframes su { from { transform: translateY(50px); opacity:0; } to { transform: translateY(0); opacity:1; } }
.sbg { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.45); display: flex; align-items: flex-end; justify-content: center; animation: fi 0.3s; backdrop-filter: blur(8px); }
.sht { width: 100%; max-width: 600px; border-radius: 30px 30px 0 0; max-height: 90dvh; display: flex; flex-direction: column; animation: su 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.3); overflow: hidden; background: var(--bg-color); }
.sht-hd { padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--sep); }
.sht-hd h3 { font-size: 18px; font-weight: 800; }
.sht-ct { flex: 1; overflow-y: auto; padding: 24px 24px 40px; }

/* FORM ELEMANLARI */
.f-grp { margin-bottom: 20px; }
.f-grp label { display: block; font-size: 11px; font-weight: 800; color: var(--lbl3); text-transform: uppercase; margin-bottom: 8px; margin-left: 4px;}
.f-inp { width: 100%; background: var(--fill); border-radius: 14px; padding: 14px 16px; color: var(--lbl); font-size: 15px; font-weight: 600; border: 1px solid transparent; transition: 0.2s; }
.f-inp:focus { border-color: var(--accent); background: transparent; }
.btn-p { width: 100%; padding: 16px; border-radius: 16px; background: var(--accent); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: var(--accent-glow); margin-top: 10px;}

</style>
</head>
<body>

<div class="bg-decor"></div>

<div id="app">
  <div class="content" id="content"></div>
  
  <div class="tabbar-wrap">
    <div class="tabbar glass" id="tabbar"></div>
  </div>
  
  <div class="fab" data-action="new-task">＋</div>
  <div id="sroot"></div>
</div>

<script>
// --- TEMEL MANTIK & VERİ ---
"use strict";

let tasks = JSON.parse(localStorage.getItem("hfit-tasks") || "[]");
let dark = JSON.parse(localStorage.getItem("hfit-dark") || "true");
let tab = "dash", dashCat = "all", dashStat = "all";
let calDate = new Date();

const CATS = ["Sunucu & Altyapı", "Veritabanı", "Yazılım", "BDDK & Raporlama", "Kullanıcı Destek", "Diğer"];
const P = { critical: {l:"Kritik", c:"#ef4444"}, high: {l:"Yüksek", c:"#f59e0b"}, medium: {l:"Orta", c:"#3b82f6"}, low: {l:"Düşük", c:"#10b981"} };
const S = { todo: "Bekliyor", inprogress: "Devam", review: "İnceleme", done: "Bitti" };

function sv() { localStorage.setItem("hfit-tasks", JSON.stringify(tasks)); }
function esc(s) { return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;"); }
function uid() { return Math.random().toString(36).slice(2, 9); }

// --- TAKVİM RENDERER ---
function renderCalendar() {
  const year = calDate.getFullYear();
  const month = calDate.getMonth();
  const monthNames = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
  
  const firstDay = new Date(year, month, 1).getDay() || 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = new Date().toISOString().split('T')[0];

  let h = `<div class="cal-box glass">
    <div class="cal-hdr">
      <h2>${monthNames[month]} ${year}</h2>
      <div class="cal-nav">
        <button data-action="prev-month">❮</button>
        <button data-action="next-month">❯</button>
      </div>
    </div>
    <div class="cal-days-title"><span>Pt</span><span>Sa</span><span>Ça</span><span>Pe</span><span>Cu</span><span>Ct</span><span>Pz</span></div>
    <div class="cal-grid">`;

  for (let i = 1; i < firstDay; i++) h += `<div class="cal-cell empty"></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayTasks = tasks.filter(t => t.dueDate === dStr);
    const isToday = (dStr === todayStr) ? ' today' : '';

    h += `<div class="cal-cell${isToday}">
      <span>${d}</span>
      <div class="cal-task-list">`;
      dayTasks.slice(0, 2).forEach(t => {
        const c = P[t.priority] ? P[t.priority].c : '#94a3b8';
        h += `<div class="cal-task-item" style="background:${c}">${esc(t.title)}</div>`;
      });
      if(dayTasks.length > 2) h += `<div style="font-size:7px; font-weight:800; text-align:center">+${dayTasks.length - 2}</div>`;
    h += `</div></div>`;
  }
  h += `</div></div>`;
  return h;
}

// --- GÖREV LİSTESİ RENDERER ---
function renderTaskList(filteredTasks) {
  if (filteredTasks.length === 0) return `<div class="empty glass" style="padding:40px; text-align:center;"><div class="empty-ic">📊</div><div class="empty-t" style="font-weight:700; margin-top:10px;">Veri Bulunamadı</div></div>`;
  
  let h = `<div class="tlist glass">`;
  filteredTasks.forEach(t => {
    const p = P[t.priority] || P.medium;
    h += `<div class="trow" data-action="detail" data-id="${t.id}" style="border-left-color:${p.c}">
      <div class="trow-title ${t.status==='done'?'done':''}">${esc(t.title)}</div>
      <div class="trow-meta">
        <span class="pri-tag" style="background:${p.c}15; color:${p.c}">${p.l}</span>
        <span>${esc(S[t.status])}</span>
        <span style="color:var(--lbl3)">·</span>
        <span>${esc(t.category)}</span>
      </div>
    </div>`;
  });
  h += `</div>`;
  return h;
}

// --- SAYFA GÖRÜNÜMLERİ ---
function vDash() {
  const ft = tasks.filter(t => {
    if (dashCat !== "all" && t.category !== dashCat) return false;
    if (dashStat !== "all" && t.status !== dashStat) return false;
    return true;
  }).sort((a, b) => (new Date(a.dueDate) - new Date(b.dueDate)));

  let h = `<div class="hdr"><div><div class="ovr">Hoş Geldin</div><h1>Komuta Merkezi</h1></div><div class="hdr-r"><div class="ibtn glass" data-action="toggle-dark">${dark?'☼':'☽'}</div></div></div>`;
  
  h += `<div class="dash-grid">
    <div id="cal-container">${renderCalendar()}</div>
    <div class="task-box">
      <div class="dash-filters">
        <select class="df-select" data-action="filter-cat">
          <option value="all">Tüm Kategoriler</option>
          ${CATS.map(c => `<option value="${c}" ${dashCat===c?'selected':''}>${c}</option>`).join('')}
        </select>
        <select class="df-select" data-action="filter-stat">
          <option value="all">Tüm Durumlar</option>
          ${Object.entries(S).map(([k,v]) => `<option value="${k}" ${dashStat===k?'selected':''}>${v}</option>`).join('')}
        </select>
      </div>
      <div id="task-list-container">${renderTaskList(ft)}</div>
    </div>
  </div>`;
  return h;
}

function vSettings() {
  let h = `<div class="hdr"><div><div class="ovr">Yapılandırma</div><h1>Sistem Ayarları</h1></div></div>`;
  h += `<div class="grp glass" style="margin:0">
    <div class="cell" data-action="reset" style="padding:20px; color:#ef4444; font-weight:700; text-align:center;">Tüm Verileri Temizle</div>
  </div>`;
  return h;
}

// --- ANA RENDER ---
function render() {
  document.body.classList.toggle("dark", dark);
  const cont = document.getElementById("content");
  if (tab === "dash") cont.innerHTML = vDash();
  else cont.innerHTML = vSettings();

  const tb = document.getElementById("tabbar");
  tb.innerHTML = [
    {id:"dash", l:"Ana Sayfa", i:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="9" rx="2"/><rect x="14" y="3" width="7" height="5" rx="2"/><rect x="14" y="12" width="7" height="9" rx="2"/><rect x="3" y="16" width="7" height="5" rx="2"/></svg>'},
    {id:"settings", l:"Ayarlar", i:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6 1.65 1.65 0 0010 3.09V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09A1.65 1.65 0 0019.4 15z"/></svg>'}
  ].map(t => `<div class="tab-btn ${tab===t.id?'active':''}" data-action="tab" data-val="${t.id}">${t.i}<span>${t.l}</span></div>`).join('');
}

// --- MODAL & FORM ---
function openForm(id = null) {
  const t = id ? tasks.find(x => x.id === id) : {title:"", description:"", priority:"medium", status:"todo", category:CATS[0], dueDate:new Date().toISOString().split('T')[0]};
  
  document.getElementById("sroot").innerHTML = `
    <div class="sbg" data-action="close-sheet">
      <div class="sht glass">
        <div class="sht-hd"><h3>${id?'Düzenle':'Yeni Görev'}</h3><button data-action="close-sheet" style="font-weight:700">✕</button></div>
        <div class="sht-ct">
          <div class="f-grp"><label>Başlık</label><input id="f-title" class="f-inp" value="${esc(t.title)}"></div>
          <div class="f-grp"><label>Açıklama</label><textarea id="f-desc" class="f-inp">${esc(t.description)}</textarea></div>
          <div class="f-grp" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div><label>Öncelik</label><select id="f-pri" class="f-inp">
              ${Object.entries(P).map(([k,v]) => `<option value="${k}" ${t.priority===k?'selected':''}>${v.l}</option>`).join('')}
            </select></div>
            <div><label>Kategori</label><select id="f-cat" class="f-inp">
              ${CATS.map(c => `<option value="${c}" ${t.category===c?'selected':''}>${c}</option>`).join('')}
            </select></div>
          </div>
          <div class="f-grp"><label>Teslim Tarihi</label><input id="f-date" type="date" class="f-inp" value="${t.dueDate}"></div>
          <button class="btn-p" id="save-btn">${id?'Güncelle':'Kaydet'}</button>
          ${id ? `<button class="btn-p" style="background:#ef4444; margin-top:10px" id="del-btn">Görevi Sil</button>` : ''}
        </div>
      </div>
    </div>`;

  document.getElementById("save-btn").onclick = () => {
    const nt = {
      id: id || uid(),
      title: document.getElementById("f-title").value,
      description: document.getElementById("f-desc").value,
      priority: document.getElementById("f-pri").value,
      status: t.status,
      category: document.getElementById("f-cat").value,
      dueDate: document.getElementById("f-date").value
    };
    if(!nt.title) return alert("Başlık boş olamaz");
    if(id) tasks = tasks.map(x => x.id === id ? nt : x); else tasks.unshift(nt);
    sv(); closeSheet(); render();
  };
  
  if(id) document.getElementById("del-btn").onclick = () => { if(confirm("Silinsin mi?")) { tasks = tasks.filter(x => x.id !== id); sv(); closeSheet(); render(); } };
}

function closeSheet() { document.getElementById("sroot").innerHTML = ""; }

// --- EVENT DİNLEYİCİLERİ ---
document.addEventListener("click", e => {
  const el = e.target.closest("[data-action]");
  if (e.target.classList.contains("sbg")) closeSheet();
  if (!el) return;
  const act = el.dataset.action;
  const val = el.dataset.val;
  const id = el.dataset.id;

  if (act === "tab") { tab = val; render(); }
  if (act === "toggle-dark") { dark = !dark; localStorage.setItem("hfit-dark", dark); render(); }
  if (act === "new-task") openForm();
  if (act === "detail") openForm(id);
  if (act === "close-sheet") closeSheet();
  if (act === "prev-month") { calDate.setMonth(calDate.getMonth() - 1); document.getElementById("cal-container").innerHTML = renderCalendar(); }
  if (act === "next-month") { calDate.setMonth(calDate.getMonth() + 1); document.getElementById("cal-container").innerHTML = renderCalendar(); }
  if (act === "reset") { if(confirm("Tüm veri silinecek?")) { tasks = []; sv(); render(); } }
});

document.addEventListener("change", e => {
  const act = e.target.dataset.action;
  if (act === "filter-cat") { dashCat = e.target.value; document.getElementById("task-list-container").innerHTML = renderTaskList(tasks.filter(t => (dashCat==='all'||t.category===dashCat)&&(dashStat==='all'||t.status===dashStat))); }
  if (act === "filter-stat") { dashStat = e.target.value; document.getElementById("task-list-container").innerHTML = renderTaskList(tasks.filter(t => (dashCat==='all'||t.category===dashCat)&&(dashStat==='all'||t.status===dashStat))); }
});

render();
</script>
</body>
</html>
