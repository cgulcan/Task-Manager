<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HF IT">
<meta name="theme-color" content="#fafaf7">
<title>HF IT Görev Takip</title>
<style>
:root{
  --bg:#fafaf7;--card:#ffffff;--press:#f0efeb;--sep:rgba(0,0,0,.08);
  --lbl:#1a1a1a;--lbl2:#595959;--lbl3:#8c8c8c;--lbl4:#c7c7c2;
  --accent:#1a1a1a;--accent2:#595959;
  --blue-bg:#E6F1FB;--blue-fg:#0C447C;--blue-mid:#378ADD;
  --teal-bg:#E1F5EE;--teal-fg:#085041;--teal-mid:#1D9E75;
  --coral-bg:#FAECE7;--coral-fg:#712B13;--coral-mid:#D85A30;
  --amber-bg:#FAEEDA;--amber-fg:#633806;--amber-mid:#BA7517;
  --purple-bg:#EEEDFE;--purple-fg:#3C3489;--purple-mid:#7F77DD;
  --red-bg:#FCEBEB;--red-fg:#791F1F;--red-mid:#E24B4A;
  --green-bg:#EAF3DE;--green-fg:#27500A;--green-mid:#639922;
  --gray-bg:#F1EFE8;--gray-fg:#444441;--gray-mid:#888780;
  --fill:rgba(0,0,0,.04);--fill2:rgba(0,0,0,.08);
  --shadow:0 1px 2px rgba(0,0,0,.04);
}
body.dark{
  --bg:#0c0c0c;--card:#171717;--press:#242424;--sep:rgba(255,255,255,.08);
  --lbl:#f5f5f5;--lbl2:#a3a3a3;--lbl3:#6e6e6e;--lbl4:#404040;
  --accent:#f5f5f5;--accent2:#a3a3a3;
  --blue-bg:rgba(55,138,221,.12);--blue-fg:#85B7EB;--blue-mid:#378ADD;
  --teal-bg:rgba(29,158,117,.12);--teal-fg:#5DCAA5;--teal-mid:#1D9E75;
  --coral-bg:rgba(216,90,48,.12);--coral-fg:#F0997B;--coral-mid:#D85A30;
  --amber-bg:rgba(186,117,23,.15);--amber-fg:#EF9F27;--amber-mid:#BA7517;
  --purple-bg:rgba(127,119,221,.15);--purple-fg:#AFA9EC;--purple-mid:#7F77DD;
  --red-bg:rgba(226,75,74,.12);--red-fg:#F09595;--red-mid:#E24B4A;
  --green-bg:rgba(99,153,34,.12);--green-fg:#97C459;--green-mid:#639922;
  --gray-bg:rgba(180,178,169,.08);--gray-fg:#B4B2A9;--gray-mid:#888780;
  --fill:rgba(255,255,255,.06);--fill2:rgba(255,255,255,.1);
  --shadow:0 1px 3px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','SF Pro Display','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--lbl);transition:background .3s,color .3s;display:flex;flex-direction:column;max-width:900px;margin:0 auto;user-select:none;-webkit-user-select:none;letter-spacing:-.01em}
input,textarea,select,button{font-family:inherit;color:inherit;background:none;border:none;outline:none;letter-spacing:inherit}
::-webkit-scrollbar{width:0;height:0}

.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:88px}

/* HEADER */
.hdr{padding:max(env(safe-area-inset-top,0),12px) 20px 16px;display:flex;align-items:center;justify-content:space-between}
.hdr-l .ovr{font-size:11px;letter-spacing:2px;color:var(--lbl3);text-transform:uppercase;margin-bottom:4px;font-weight:500}
.hdr-l h1{font-size:26px;font-weight:500;letter-spacing:-.5px;line-height:1.1}
.hdr-r{display:flex;align-items:center;gap:10px}
.ibtn{width:38px;height:38px;border-radius:50%;background:var(--fill);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .15s;border:none;color:var(--lbl)}
.ibtn:active{transform:scale(.92);background:var(--fill2)}
.ibtn.primary{background:var(--accent);color:var(--bg)}
.ava{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:500;font-size:13px;letter-spacing:-.3px}

/* SECTION */
.sec{padding:0 20px 20px}
.sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 2px}
.sec-h .lbl{font-size:11px;font-weight:500;color:var(--lbl3);letter-spacing:1.5px;text-transform:uppercase}
.sec-h .cnt{font-size:11px;color:var(--lbl4);font-weight:500}

/* HERO CARD */
.hero{background:var(--card);border:.5px solid var(--sep);border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.hero-top-l .ovr{font-size:11px;color:var(--lbl3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;font-weight:500}
.hero-top-l .sub{font-size:13px;color:var(--lbl2)}
.hero-chip{font-size:11px;padding:5px 12px;border-radius:20px;font-weight:500;letter-spacing:.2px}
.hero-chip.up{color:var(--green-fg);background:var(--green-bg)}
.hero-chip.down{color:var(--red-fg);background:var(--red-bg)}
.hero-num{display:flex;align-items:baseline;gap:8px;margin-bottom:14px}
.hero-num .n{font-size:48px;font-weight:500;letter-spacing:-2px;line-height:.95;font-variant-numeric:tabular-nums}
.hero-num .s{font-size:18px;color:var(--lbl3);font-weight:400}
.hero-num .t{font-size:13px;color:var(--lbl2);margin-left:auto;font-variant-numeric:tabular-nums}
.hero-bar{height:5px;background:var(--fill);border-radius:3px;overflow:hidden;display:flex;gap:2px}
.hero-bar > div:first-child{background:var(--teal-mid);border-radius:3px 0 0 3px}
.hero-bar > div:last-child{background:var(--fill)}

/* STAT TILES */
.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.tile{border-radius:14px;padding:14px;cursor:pointer;transition:transform .15s;background:var(--card);border:.5px solid var(--sep)}
.tile:active{transform:scale(.98)}
.tile-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.tile-dot{width:8px;height:8px;border-radius:50%}
.tile-lbl{font-size:10.5px;letter-spacing:1px;text-transform:uppercase;font-weight:500}
.tile-n{font-size:26px;font-weight:500;letter-spacing:-1px;line-height:1;margin-bottom:2px;font-variant-numeric:tabular-nums}
.tile-s{font-size:12px}
.tile.coral{background:var(--coral-bg);border-color:transparent}
.tile.coral .tile-dot{background:var(--coral-mid)}
.tile.coral .tile-lbl{color:var(--coral-fg)}
.tile.coral .tile-n{color:var(--coral-fg)}
.tile.coral .tile-s{color:var(--coral-mid)}
.tile.blue{background:var(--blue-bg);border-color:transparent}
.tile.blue .tile-dot{background:var(--blue-mid)}
.tile.blue .tile-lbl{color:var(--blue-fg)}
.tile.blue .tile-n{color:var(--blue-fg)}
.tile.blue .tile-s{color:var(--blue-mid)}
.tile.purple{background:var(--purple-bg);border-color:transparent}
.tile.purple .tile-dot{background:var(--purple-mid)}
.tile.purple .tile-lbl{color:var(--purple-fg)}
.tile.purple .tile-n{color:var(--purple-fg)}
.tile.purple .tile-s{color:var(--purple-mid)}
.tile.teal{background:var(--teal-bg);border-color:transparent}
.tile.teal .tile-dot{background:var(--teal-mid)}
.tile.teal .tile-lbl{color:var(--teal-fg)}
.tile.teal .tile-n{color:var(--teal-fg)}
.tile.teal .tile-s{color:var(--teal-mid)}

/* TASK LIST CONTAINER */
.tlist{background:var(--card);border:.5px solid var(--sep);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}

/* TASK ROW */
.trow{padding:14px 16px;border-bottom:.5px solid var(--sep);cursor:pointer;transition:background .12s;border-left:3px solid transparent}
.trow:last-child{border-bottom:none}
.trow:active{background:var(--press)}
.trow-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px}
.trow-title{font-size:15px;font-weight:500;letter-spacing:-.1px;line-height:1.3;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.trow-title.done{color:var(--lbl3);text-decoration:line-through}
.pri-chip{font-size:10px;padding:3px 9px;border-radius:5px;font-weight:500;letter-spacing:.4px;white-space:nowrap;flex-shrink:0}
.trow-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--lbl2);flex-wrap:wrap}
.trow-meta .dot{color:var(--lbl4)}
.trow-pbar{display:flex;align-items:center;gap:10px;margin-top:10px}
.trow-pbar-bar{flex:1;height:3px;background:var(--fill);border-radius:2px;overflow:hidden}
.trow-pbar-bar > div{height:100%;background:var(--teal-mid);border-radius:2px;transition:width .4s}
.trow-pbar-n{font-size:11px;color:var(--lbl3);font-variant-numeric:tabular-nums;font-weight:500}
.trow-bot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}

/* CHIPS */
.chip-critical{background:var(--red-bg);color:var(--red-fg)}
.chip-high{background:var(--amber-bg);color:var(--amber-fg)}
.chip-medium{background:var(--blue-bg);color:var(--blue-fg)}
.chip-low{background:var(--green-bg);color:var(--green-fg)}
.chip-todo{background:var(--gray-bg);color:var(--gray-fg)}
.chip-inprogress{background:var(--blue-bg);color:var(--blue-fg)}
.chip-review{background:var(--purple-bg);color:var(--purple-fg)}
.chip-done{background:var(--teal-bg);color:var(--teal-fg)}

/* TABBAR */
.tabbar{flex-shrink:0;background:var(--bg);border-top:.5px solid var(--sep);display:flex;justify-content:space-around;padding:8px 0 calc(env(safe-area-inset-bottom,8px) + 6px);position:relative;z-index:50}
.tab-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--lbl3);font-size:10px;font-weight:500;cursor:pointer;padding:4px 14px;min-width:50px;transition:color .2s;letter-spacing:.3px}
.tab-btn.active{color:var(--accent)}
.tab-btn svg{width:22px;height:22px;stroke-width:1.8}

/* FAB */
.fab{position:fixed;bottom:74px;right:16px;z-index:400;width:52px;height:52px;border-radius:50%;background:var(--accent);color:var(--bg);border:none;font-size:22px;font-weight:300;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;transition:transform .15s}
.fab:active{transform:scale(.9)}

/* SEARCH */
.search{display:flex;align-items:center;gap:10px;background:var(--card);border:.5px solid var(--sep);border-radius:12px;padding:10px 14px;margin-bottom:12px;box-shadow:var(--shadow)}
.search input{flex:1;font-size:15px;color:var(--lbl)}
.search input::placeholder{color:var(--lbl3)}
.search svg{flex-shrink:0;color:var(--lbl3)}
.search .clr{background:var(--fill);border:none;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--lbl3);font-size:10px;flex-shrink:0}

/* SEG */
.seg{display:flex;background:var(--fill);border-radius:10px;padding:3px;gap:0;margin-bottom:12px}
.seg button{flex:1;padding:8px 4px;border-radius:8px;border:none;background:transparent;color:var(--lbl2);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s;font-weight:500;letter-spacing:.1px}
.seg button.active{background:var(--card);color:var(--accent);font-weight:500;box-shadow:0 1px 2px rgba(0,0,0,.06)}

/* BOARD */
.board{display:flex;gap:14px;padding:0 20px 100px;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
.bcol{min-width:260px;flex:0 0 260px;scroll-snap-align:start}
.bcol-h{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 12px}
.bcol-h-l{display:flex;align-items:center;gap:8px}
.bcol-dot{width:8px;height:8px;border-radius:50%}
.bcol-t{font-size:12px;font-weight:500;letter-spacing:1px;text-transform:uppercase}
.bcol-n{font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px;min-width:22px;text-align:center}
.bcard{background:var(--card);border:.5px solid var(--sep);border-radius:12px;padding:14px;cursor:pointer;margin-bottom:8px;border-left:3px solid transparent;transition:transform .15s;box-shadow:var(--shadow)}
.bcard:active{transform:scale(.98)}
.bcard-t{font-size:14px;font-weight:500;margin-bottom:8px;line-height:1.35;letter-spacing:-.1px}

/* SHEET */
.sbg{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;animation:fi .25s;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.sht{background:var(--bg);width:100%;max-width:600px;border-radius:20px 20px 0 0;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;animation:su .4s cubic-bezier(.32,.72,0,1)}
.sht-bar{display:flex;justify-content:center;padding:10px 0 0}
.sht-bar div{width:36px;height:4px;border-radius:2px;background:var(--lbl4)}
.sht-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 16px;border-bottom:.5px solid var(--sep)}
.sht-hd button{background:none;border:none;color:var(--lbl2);font-size:15px;cursor:pointer;min-width:60px;padding:0;font-weight:500}
.sht-hd .sv{color:var(--accent);font-weight:500;text-align:right}
.sht-hd .sv:disabled{color:var(--lbl4);cursor:default}
.sht-hd .tt{font-size:15px;font-weight:500;letter-spacing:-.1px}
.sht-ct{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 0 32px}

/* FORM SHEET */
.grp{margin:0 20px 18px}
.grp-h{font-size:11px;color:var(--lbl3);text-transform:uppercase;padding:0 16px 8px;letter-spacing:1.2px;font-weight:500}
.grp-b{background:var(--card);border:.5px solid var(--sep);border-radius:12px;overflow:hidden}
.cell{display:flex;align-items:center;gap:14px;padding:13px 16px;min-height:44px;border-bottom:.5px solid var(--sep);cursor:pointer;transition:background .12s}
.cell:last-child{border-bottom:none}
.cell:active{background:var(--press)}
.cell-ic{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.cell-b{flex:1;min-width:0}
.cell-t{font-size:15px;letter-spacing:-.1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cell-sub{font-size:12px;color:var(--lbl3);margin-top:2px}
.cell-v{font-size:14px;color:var(--lbl2);font-variant-numeric:tabular-nums}
.cell-arr{color:var(--lbl4);font-size:18px;margin-left:2px}
.cell.dest .cell-t{color:var(--red-mid)}

.ff{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;min-height:44px;border-bottom:.5px solid var(--sep);gap:12px}
.ff:last-child{border-bottom:none}
.ff label{font-size:15px;flex-shrink:0;font-weight:500}
.ff input,.ff textarea,.ff select{font-size:15px;width:100%;color:var(--lbl)}
.ff input[type="date"]{color:var(--blue-mid);text-align:right;font-weight:500}
.ff select{color:var(--blue-mid);-webkit-appearance:none;appearance:none;direction:rtl;cursor:pointer;max-width:220px;padding-right:0;font-weight:500}
.ff textarea{text-align:left;resize:none;min-height:78px;line-height:1.5}
.ff .right{text-align:right}

/* DETAIL SHEET */
.dh{padding:6px 20px 22px}
.dh h2{font-size:22px;font-weight:500;letter-spacing:-.4px;line-height:1.25;margin-bottom:8px}
.dh p{font-size:14px;color:var(--lbl2);line-height:1.55}

/* SUB ROW */
.sub-row{display:flex;align-items:center;gap:14px;padding:13px 16px;border-bottom:.5px solid var(--sep);transition:background .1s}
.sub-row:last-child{border-bottom:none}
.sub-row .sub-text{flex:1;font-size:15px;line-height:1.35}
.sub-row.done .sub-text{color:var(--lbl3);text-decoration:line-through}
.del-btn{background:none;border:none;color:var(--red-mid);font-size:20px;cursor:pointer;padding:0 6px;line-height:1;font-weight:300}

/* CHECK */
.chk{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:13px;padding:0;transition:all .15s}
.chk-off{border:1.5px solid var(--lbl4);background:transparent}
.chk-on{border:none;background:var(--teal-mid);color:#fff}
.chk:active{transform:scale(.88)}

/* TOGGLE */
.toggle{width:46px;height:28px;border-radius:15px;padding:2px;cursor:pointer;transition:background .25s;flex-shrink:0;background:var(--fill2)}
.toggle.on{background:var(--teal-mid)}
.toggle-k{width:24px;height:24px;border-radius:50%;background:#fff;transition:transform .25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on .toggle-k{transform:translateX(18px)}

/* CONN */
.conn-strip{display:flex;align-items:center;gap:8px;padding:0 20px 12px;font-size:12px;color:var(--lbl3);font-weight:500;letter-spacing:.1px}
.conn-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* EMPTY */
.empty{padding:50px 24px;text-align:center}
.empty-ic{font-size:42px;margin-bottom:14px;opacity:.4}
.empty-t{font-size:15px;font-weight:500;margin-bottom:6px}
.empty-s{font-size:13px;color:var(--lbl3)}

/* PROGRESS (DETAIL) */
.pbar-lg{height:6px;background:var(--fill);border-radius:3px;overflow:hidden}
.pbar-f{height:100%;background:var(--teal-mid);border-radius:3px;transition:width .4s}

/* BUTTON PRIMARY */
.btn-p{width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent);color:var(--bg);font-size:15px;font-weight:500;cursor:pointer;transition:all .15s;letter-spacing:-.1px}
.btn-p:active{transform:scale(.98)}
.btn-p:disabled{background:var(--fill);color:var(--lbl4);cursor:default;transform:none}

/* ADD ROW */
.add-row{display:flex;align-items:center;gap:10px;padding:11px 16px}
.add-row input{flex:1;font-size:15px;color:var(--lbl)}
.add-row button{background:var(--accent);color:var(--bg);border:none;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;font-weight:300;flex-shrink:0;transition:transform .1s}
.add-row button:active{transform:scale(.88)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;letter-spacing:.2px}

@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div class="content" id="content"></div>
<div class="tabbar" id="tabbar"></div>
<button class="fab" data-action="new-task">＋</button>
<div id="sroot"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
"use strict";

var FC={apiKey:"",authDomain:"",projectId:"",storageBucket:"",messagingSenderId:"",appId:""};
var db=null,fbok=false;
try{if(FC.apiKey&&FC.apiKey.length>5){firebase.initializeApp(FC);db=firebase.firestore();fbok=true}}catch(e){console.warn(e)}

var P={
  critical:{l:"Kritik",lu:"KRİTİK",s:0},
  high:{l:"Yüksek",lu:"YÜKSEK",s:1},
  medium:{l:"Orta",lu:"ORTA",s:2},
  low:{l:"Düşük",lu:"DÜŞÜK",s:3}
};
var S={
  todo:{l:"Bekliyor"},
  inprogress:{l:"Devam"},
  review:{l:"İnceleme"},
  done:{l:"Tamamlandı"}
};
var CATS=["Sunucu & Altyapı","Veritabanı","Yazılım","Ağ & Güvenlik","Kullanıcı Destek","BDDK & Raporlama","Dijitalleşme","Diğer"];

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function lg(k,f){try{var v=localStorage.getItem(k);return v?JSON.parse(v):f}catch(e){return f}}
function ls(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function fd(d){if(!d)return"";try{return new Date(d).toLocaleDateString("tr-TR",{day:"numeric",month:"short"})}catch(e){return""}}
function fl(d){if(!d)return"";try{return new Date(d).toLocaleDateString("tr-TR",{day:"numeric",month:"long",year:"numeric",weekday:"long"})}catch(e){return""}}
function dl(d){if(!d)return null;var t=new Date();t.setHours(0,0,0,0);var x=new Date(d);x.setHours(0,0,0,0);return Math.ceil((x-t)/864e5)}

var ft=tasks.filter(function(t){
if(sfilt!=="all"&&t.status!==sfilt)return false;
if(q&&t.title.toLowerCase().indexOf(q)===-1&&t.category.toLowerCase().indexOf(q)===-1&&(t.description||"").toLowerCase().indexOf(q)===-1)return false;
return true;
}).sort(function(a,b){return P[a.priority].s-P[b.priority].s});
var h="";
if(!ft.length)h='<div class="empty"><div class="empty-ic">◯</div><div class="empty-t">Görev bulunamadı</div><div class="empty-s">farklı anahtar kelime dene</div></div>';
else ft.forEach(function(t){h+=trowH(t)});
el.innerHTML=h;
}

function closeSheet(){var r=document.getElementById("sroot");r.innerHTML="";formData=null}

function openDetail(id){
var t=findTask(id);if(!t)return;
var p=P[t.priority]||P.medium,a=fm(t.assignee),d=dl(t.dueDate);
var su=t.subtasks||[],sd=su.filter(function(x){return x.done}).length,st=su.length;
var priColor={critical:"var(--red-mid)",high:"var(--amber-mid)",medium:"var(--blue-mid)",low:"var(--green-mid)"}[t.priority];

var h='<div class="sbg" data-action="close-sheet"><div class="sht" data-stop="1"><div class="sht-bar"><div></div></div>';
h+='<div class="sht-hd"><button data-action="close-sheet">Kapat</button><span class="tt">Görev Detayı</span><button class="sv" data-action="edit-task" data-id="'+esc(t.id)+'">Düzenle</button></div>';
h+='<div class="sht-ct">';
h+='<div class="dh"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'+priChip(t.priority)+'<span style="font-size:12px;color:var(--lbl3)">'+esc(t.category)+'</span></div>';
h+='<h2>'+esc(t.title)+'</h2>';
if(t.description)h+='<p>'+esc(t.description)+'</p>';
h+='</div>';

h+='<div style="padding:0 20px 20px"><div style="font-size:11px;color:var(--lbl3);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:10px;padding:0 4px;font-weight:500">Durum</div>';
h+='<div class="seg">';
Object.keys(S).forEach(function(k){h+='<button data-action="change-status" data-id="'+esc(t.id)+'" data-val="'+k+'" class="'+(t.status===k?"active":"")+'">'+S[k].l+'</button>'});
h+='</div></div>';

h+='<div class="grp"><div class="grp-h">Bilgiler</div><div class="grp-b">';
if(a){h+='<div class="cell">'+avH(a.name,32)+'<div class="cell-b"><div class="cell-t">Atanan</div><div class="cell-sub">'+esc(a.name)+'</div></div></div>'}
if(t.dueDate){
h+='<div class="cell"><div class="cell-ic" style="background:'+(d!==null&&d<0?"var(--red-bg);color:var(--red-fg)":d!==null&&d<=2?"var(--amber-bg);color:var(--amber-fg)":"var(--teal-bg);color:var(--teal-fg)")+'">◷</div><div class="cell-b"><div class="cell-t">Son Tarih</div><div class="cell-sub">'+esc(fl(t.dueDate))+'</div></div>';
if(d!==null&&d<0)h+='<span class="badge" style="background:var(--red-bg);color:var(--red-fg)">Gecikti</span>';
else if(d===0)h+='<span class="badge" style="background:var(--amber-bg);color:var(--amber-fg)">Bugün</span>';
else if(d===1)h+='<span class="badge" style="background:var(--blue-bg);color:var(--blue-fg)">Yarın</span>';
h+='</div>';
}
h+='<div class="cell"><div class="cell-ic" style="background:var(--fill);color:var(--lbl3)">◉</div><div class="cell-b"><div class="cell-t">Oluşturulma</div><div class="cell-sub">'+esc(fd(t.createdAt))+'</div></div></div>';
h+='</div></div>';

if(st>0){
h+='<div class="grp"><div class="grp-h">Alt Görevler · '+sd+'/'+st+'</div><div class="grp-b">';
su.forEach(function(sub){
h+='<div class="sub-row'+(sub.done?" done":"")+'">';
h+='<button class="chk '+(sub.done?"chk-on":"chk-off")+'" data-action="toggle-sub" data-tid="'+esc(t.id)+'" data-sid="'+esc(sub.id)+'">'+(sub.done?"✓":"")+'</button>';
h+='<span class="sub-text">'+esc(sub.text)+'</span>';
h+='</div>';
});
h+='<div style="padding:16px"><div class="pbar-lg"><div class="pbar-f" style="width:'+(sd/st*100)+'%"></div></div><div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--lbl3);font-weight:500;letter-spacing:.3px;text-transform:uppercase"><span>İlerleme</span><span style="font-variant-numeric:tabular-nums">%'+Math.round(sd/st*100)+'</span></div></div>';
h+='</div></div>';
}

h+='<div class="grp"><div class="grp-b"><div class="cell dest" data-action="delete-task" data-id="'+esc(t.id)+'"><div class="cell-ic" style="background:var(--red-bg);color:var(--red-fg)">×</div><div class="cell-b"><div class="cell-t">Görevi sil</div></div></div></div></div>';
h+='</div></div></div>';
document.getElementById("sroot").innerHTML=h;
}

function openForm(id){
var t=id?findTask(id):null;
var f=t?JSON.parse(JSON.stringify(t)):{id:"",title:"",description:"",priority:"medium",status:"todo",category:CATS[0],assignee:"",dueDate:"",subtasks:[]};
formData=f;
var ed=!!t;

var h='<div class="sbg" data-action="close-sheet"><div class="sht" data-stop="1"><div class="sht-bar"><div></div></div>';
h+='<div class="sht-hd"><button data-action="close-sheet">İptal</button><span class="tt">'+(ed?"Görevi Düzenle":"Yeni Görev")+'</span><button class="sv" data-action="save-task"'+(f.title.trim()?"":" disabled")+'>'+(ed?"Kaydet":"Ekle")+'</button></div>';
h+='<div class="sht-ct">';
h+='<div class="grp"><div class="grp-b">';
h+='<div style="padding:14px 16px;border-bottom:.5px solid var(--sep)"><input id="ft" value="'+esc(f.title)+'" placeholder="Görev başlığı" style="width:100%;font-size:17px;font-weight:500;letter-spacing:-.2px" autocomplete="off"></div>';
h+='<div style="padding:12px 16px"><textarea id="fd" placeholder="Açıklama ekle..." rows="3" style="width:100%;font-size:14px;resize:none;line-height:1.5">'+esc(f.description)+'</textarea></div>';
h+='</div></div>';

h+='<div class="grp"><div class="grp-h">Detaylar</div><div class="grp-b">';
h+='<div class="ff"><label>Öncelik</label><select id="fp">';Object.keys(P).forEach(function(k){h+='<option value="'+k+'"'+(f.priority===k?" selected":"")+'>'+P[k].l+'</option>'});h+='</select></div>';
h+='<div class="ff"><label>Durum</label><select id="fs">';Object.keys(S).forEach(function(k){h+='<option value="'+k+'"'+(f.status===k?" selected":"")+'>'+S[k].l+'</option>'});h+='</select></div>';
h+='<div class="ff"><label>Kategori</label><select id="fc">';CATS.forEach(function(c){h+='<option'+(f.category===c?" selected":"")+'>'+esc(c)+'</option>'});h+='</select></div>';
h+='<div class="ff"><label>Atanan</label><select id="fa"><option value="">Seçilmedi</option>';team.forEach(function(m){h+='<option value="'+esc(m.id)+'"'+(f.assignee===m.id?" selected":"")+'>'+esc(m.name)+'</option>'});h+='</select></div>';
h+='<div class="ff"><label>Son Tarih</label><input type="date" id="fdt" value="'+(f.dueDate||"")+'"></div>';
h+='</div></div>';

h+='<div class="grp"><div class="grp-h">Alt Görevler</div><div class="grp-b">';
(f.subtasks||[]).forEach(function(st,i){
h+='<div class="sub-row'+(st.done?" done":"")+'">';
h+='<button class="chk '+(st.done?"chk-on":"chk-off")+'" data-action="form-toggle-sub" data-idx="'+i+'">'+(st.done?"✓":"")+'</button>';
h+='<span class="sub-text">'+esc(st.text)+'</span>';
h+='<button class="del-btn" data-action="form-del-sub" data-idx="'+i+'">−</button>';
h+='</div>';
});
h+='<div class="add-row"><input id="fns" placeholder="Yeni alt görev..." autocomplete="off"><button data-action="form-add-sub">+</button></div>';
h+='</div></div>';

if(ed){
h+='<div class="grp"><div class="grp-b"><div class="cell dest" data-action="delete-task" data-id="'+esc(f.id)+'"><div class="cell-ic" style="background:var(--red-bg);color:var(--red-fg)">×</div><div class="cell-b"><div class="cell-t">Görevi sil</div></div></div></div></div>';
}

h+='</div></div></div>';
document.getElementById("sroot").innerHTML=h;
setTimeout(function(){
var inp=document.getElementById("ft");
if(inp){inp.addEventListener("input",function(){var btn=document.querySelector("[data-action=save-task]");if(btn)btn.disabled=!inp.value.trim()});if(!ed)inp.focus()}
},50);
}

function openTeam(){
var h='<div class="sbg" data-action="close-sheet"><div class="sht" data-stop="1"><div class="sht-bar"><div></div></div>';
h+='<div class="sht-hd"><button data-action="close-sheet">Kapat</button><span class="tt">Ekip</span><div style="min-width:60px"></div></div>';
h+='<div class="sht-ct">';
h+='<div class="grp"><div class="grp-h">'+team.length+' üye</div><div class="grp-b">';
team.forEach(function(m){
h+='<div class="cell">'+avH(m.name,38)+'<div class="cell-b"><div class="cell-t">'+esc(m.name)+'</div><div class="cell-sub">'+esc(m.role)+'</div></div>';
if(team.length>1)h+='<button class="del-btn" data-action="del-member" data-id="'+esc(m.id)+'">−</button>';
h+='</div>';
});
h+='</div></div>';
h+='<div class="grp"><div class="grp-h">Yeni Üye</div><div class="grp-b">';
h+='<div class="ff"><label>Ad Soyad</label><input id="tmn" placeholder="İsim" class="right"></div>';
h+='<div class="ff"><label>Rol</label><input id="tmr" placeholder="Yazılımcı" class="right"></div>';
h+='<div style="padding:14px 16px"><button class="btn-p" data-action="add-member">Üye Ekle</button></div>';
h+='</div></div>';
h+='</div></div></div>';
document.getElementById("sroot").innerHTML=h;
setTimeout(function(){var inp=document.getElementById("tmn");if(inp)inp.focus()},100);
}

function syncForm(){
if(!formData)return;
var el;
el=document.getElementById("ft");if(el)formData.title=el.value;
el=document.getElementById("fd");if(el)formData.description=el.value;
el=document.getElementById("fp");if(el)formData.priority=el.value;
el=document.getElementById("fs");if(el)formData.status=el.value;
el=document.getElementById("fc");if(el)formData.category=el.value;
el=document.getElementById("fa");if(el)formData.assignee=el.value;
el=document.getElementById("fdt");if(el)formData.dueDate=el.value;
}

function exportData(){
var data={tasks:tasks,team:team,exportDate:new Date().toISOString()};
var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
var url=URL.createObjectURL(blob);
var a=document.createElement("a");a.href=url;a.download="hfit-"+new Date().toISOString().slice(0,10)+".json";
document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function syncToFB(t){
if(!fbok||!db)return;
var data={};
Object.keys(t).forEach(function(k){if(k!=="id")data[k]=t[k]});
db.collection("tasks").doc(t.id).set(data).catch(function(e){console.error(e)});
}

document.addEventListener("click",function(e){
var el=e.target.closest("[data-action]");
if(!el)return;
var act=el.getAttribute("data-action");
var id=el.getAttribute("data-id");
var val=el.getAttribute("data-val");

if(act==="close-sheet"){
if(el.classList.contains("sbg")||el.tagName==="BUTTON"){closeSheet()}
return;
}

switch(act){
case"tab":tab=val;sfilt="all";render();var c=document.getElementById("content");if(c)c.scrollTop=0;break;
case"new-task":openForm(null);break;
case"toggle-dark":dark=!dark;ls("hfit-dark",dark);render();break;
case"detail":openDetail(id);break;
case"edit-task":closeSheet();setTimeout(function(){openForm(id)},50);break;
case"change-status":
  var tt=findTask(id);
  if(tt){tt.status=val;sv();if(fbok)syncToFB(tt);openDetail(id);render()}
  break;
case"toggle-sub":
  var tid=el.getAttribute("data-tid"),sid=el.getAttribute("data-sid");
  var tsk=findTask(tid);
  if(tsk){(tsk.subtasks||[]).forEach(function(s){if(s.id===sid)s.done=!s.done});sv();if(fbok)syncToFB(tsk);openDetail(tid);render()}
  break;
case"delete-task":
  if(!confirm("Bu görevi silmek istediğine emin misin?"))return;
  if(fbok&&db)db.collection("tasks").doc(id).delete().catch(function(e){console.error(e)});
  tasks=tasks.filter(function(t){return t.id!==id});sv();closeSheet();render();
  break;
case"save-task":
  syncForm();if(!formData||!formData.title.trim())return;
  if(formData.id){
    var idx=-1;tasks.forEach(function(t,i){if(t.id===formData.id)idx=i});
    if(idx>=0)tasks[idx]=formData;
    if(fbok)syncToFB(formData);
  }else{
    formData.id=uid();
    formData.createdAt=new Date().toISOString();
    tasks.unshift(formData);
    if(fbok)syncToFB(formData);
  }
  sv();closeSheet();render();
  break;
case"form-toggle-sub":
  syncForm();var fi=parseInt(el.getAttribute("data-idx"));
  if(formData&&formData.subtasks[fi])formData.subtasks[fi].done=!formData.subtasks[fi].done;
  openForm(formData.id||null);
  break;
case"form-del-sub":
  syncForm();var di=parseInt(el.getAttribute("data-idx"));
  if(formData)formData.subtasks.splice(di,1);
  openForm(formData.id||null);
  break;
case"form-add-sub":
  syncForm();var ns=document.getElementById("fns");
  if(ns&&ns.value.trim()){formData.subtasks.push({id:uid(),text:ns.value.trim(),done:false});openForm(formData.id||null);setTimeout(function(){var n=document.getElementById("fns");if(n)n.focus()},50)}
  break;
case"filter-status":
  sfilt=val;
  document.querySelectorAll("#sseg button").forEach(function(b){b.classList.toggle("active",b.getAttribute("data-val")===val)});
  doFilter();
  break;
case"clear-search":
  var qi=document.getElementById("qinp");if(qi){qi.value="";doFilter();el.style.display="none"}
  break;
case"team-sheet":openTeam();break;
case"add-member":
  var mn=document.getElementById("tmn"),mr=document.getElementById("tmr");
  if(mn&&mn.value.trim()){
    var newM={id:uid(),name:mn.value.trim(),role:(mr?mr.value.trim():"")||"Ekip Üyesi"};
    team.push(newM);
    if(fbok&&db)db.collection("team").doc(newM.id).set({name:newM.name,role:newM.role}).catch(function(e){console.error(e)});
    sv();openTeam();render();
  }
  break;
case"del-member":
  if(!confirm("Bu üyeyi silmek istediğine emin misin?"))return;
  if(fbok&&db)db.collection("team").doc(id).delete().catch(function(e){console.error(e)});
  team=team.filter(function(m){return m.id!==id});sv();openTeam();render();
  break;
case"export":exportData();break;
case"reset":
  if(!confirm("Tüm görevler silinecek. Emin misin?"))return;
  if(!confirm("Geri alınamaz. Devam edelim mi?"))return;
  tasks=[];team=[{id:"1",name:"Cengiz Gülcan",role:"IT Yönetici"}];sv();render();
  break;
}
});

if(fbok){
db.collection("tasks").onSnapshot(function(snap){
var r=[];
snap.forEach(function(d){var x=d.data();if(x.createdAt&&x.createdAt.toDate)x.createdAt=x.createdAt.toDate().toISOString();r.push(Object.assign({id:d.id},x))});
if(r.length){tasks=r.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt)});sv();render()}
});
db.collection("team").onSnapshot(function(snap){
var r=[];snap.forEach(function(d){r.push(Object.assign({id:d.id},d.data()))});
if(r.length){team=r;sv();render()}
});
}

render();
console.log("HF IT v4.0 Premium loaded");
</script>
</body>
</html>
