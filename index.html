<style>
:root{
  --bg:#f2f2f7;--bg2:#fff;--card:#ffffff;--press:#e5e5ea;--sep:rgba(60,60,67,.12);
  --lbl:#000;--lbl2:#3c3c43;--lbl3:#8e8e93;--lbl4:#c7c7cc;
  --blue:#007aff;--green:#34c759;--orange:#ff9500;--red:#ff3b30;
  --purple:#af52de;--teal:#5ac8fa;--indigo:#5856d6;--pink:#ff2d55;--yellow:#ffcc00;
  --fill:rgba(120,120,128,.2);--fill2:rgba(120,120,128,.12);
  --nav:rgba(249,249,249,.85);--sheet:#ffffff;--ov:rgba(0,0,0,.4);
  --gA:#007aff;--gB:#5856d6;--shadow:0 2px 12px rgba(0,0,0,.06);
}
body.dark{
  --bg:#000;--bg2:#1c1c1e;--card:#1c1c1e;--press:#2c2c2e;--sep:rgba(84,84,88,.5);
  --lbl:#fff;--lbl2:rgba(235,235,245,.85);--lbl3:rgba(235,235,245,.55);--lbl4:rgba(235,235,245,.3);
  --blue:#0a84ff;--green:#30d158;--orange:#ff9f0a;--red:#ff453a;
  --purple:#bf5af2;--teal:#64d2ff;--indigo:#5e5ce6;--pink:#ff375f;--yellow:#ffd60a;
  --fill:rgba(120,120,128,.36);--fill2:rgba(120,120,128,.24);
  --nav:rgba(29,29,31,.85);--sheet:#1c1c1e;--ov:rgba(0,0,0,.65);
  --gA:#0a84ff;--gB:#5e5ce6;--shadow:0 2px 12px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--lbl);transition:background .3s,color .3s}
body{display:flex;flex-direction:column;max-width:900px;margin:0 auto;user-select:none;-webkit-user-select:none}
input,textarea,select,button{font-family:inherit;color:inherit;background:none;border:none;outline:none}
::-webkit-scrollbar{width:0;height:0}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:88px}
.nav{position:sticky;top:0;z-index:100;background:var(--nav);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:.5px solid var(--sep);padding:env(safe-area-inset-top,0) 16px 0}
.nav-row{height:48px;display:flex;align-items:center;justify-content:space-between}
.nav h1{font-size:34px;font-weight:800;padding:4px 0 10px;letter-spacing:-.5px}
.nav-acts{display:flex;gap:8px;align-items:center}
.nav-acts button{background:var(--fill2);border:none;color:var(--blue);font-size:18px;cursor:pointer;padding:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nav-acts button:active{transform:scale(.9);background:var(--fill)}
.nav-acts .primary{background:var(--blue);color:#fff}
.tabbar{flex-shrink:0;background:var(--nav);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-top:.5px solid var(--sep);display:flex;justify-content:space-around;padding:6px 0 calc(env(safe-area-inset-bottom,8px) + 4px);position:relative;z-index:50}
.tab-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--lbl3);font-size:10px;font-weight:500;cursor:pointer;padding:4px 12px;min-width:50px;transition:color .2s}
.tab-btn.active{color:var(--blue);font-weight:600}
.tab-btn .ti{font-size:22px;line-height:1.1}
.grp{margin:0 16px 20px}
.grp-h{font-size:13px;color:var(--lbl3);text-transform:uppercase;padding:0 16px 8px;letter-spacing:-.08px;font-weight:500}
.grp-b{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
.cell{display:flex;align-items:center;gap:12px;padding:12px 16px;min-height:44px;border-bottom:.5px solid var(--sep);cursor:pointer;transition:background .12s}
.cell:last-child{border-bottom:none}
.cell:active{background:var(--press)}
.ci{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;color:#fff}
.cb{flex:1;min-width:0}
.cl{font-size:17px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cs{font-size:13px;color:var(--lbl3);margin-top:2px}
.cd{font-size:17px;color:var(--lbl3)}
.cc{color:var(--lbl4);font-size:20px;margin-left:4px}
.dest .cl{color:var(--red)}
.trow{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:.5px solid var(--sep);cursor:pointer;transition:background .12s;position:relative}
.trow:last-child{border-bottom:none}
.trow:active{background:var(--press)}
.trow-bar{width:3px;height:40px;border-radius:2px;flex-shrink:0}
.trow-body{flex:1;min-width:0}
.trow-title{font-size:16px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.1px}
.trow-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px;font-size:12.5px}
.trow-chip{display:inline-flex;align-items:center;gap:3px;font-weight:500}
.trow-dot{color:var(--lbl4)}
.trow-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.seg{display:flex;background:var(--fill);border-radius:9px;padding:2px;gap:0}

.ff textarea{text-align:left;resize:none;min-height:80px;font-size:15px;line-height:1.45}
.ff .right{text-align:right}
.hero{border-radius:18px;padding:22px;color:#fff;margin-bottom:12px;background:linear-gradient(135deg,var(--gA),var(--gB));box-shadow:0 8px 24px rgba(10,132,255,.25);position:relative;overflow:hidden}

.hero-content{position:relative}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.sc{background:var(--card);border-radius:14px;padding:12px 8px;text-align:center;box-shadow:var(--shadow);transition:transform .15s}

.sc .l{font-size:11px;color:var(--lbl3);font-weight:500}

.bcol{min-width:280px;flex:0 0 280px;scroll-snap-align:start}
.bcard{background:var(--card);border-radius:14px;padding:14px;cursor:pointer;margin-bottom:10px;box-shadow:var(--shadow);transition:transform .15s}

.bcol-h{display:flex;align-items:center;justify-content:space-between;padding:6px 6px 12px}
.bcol-t{font-size:15px;font-weight:700}
.fab{position:fixed;bottom:78px;right:16px;z-index:400;width:56px;height:56px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:28px;font-weight:300;cursor:pointer;box-shadow:0 6px 20px rgba(10,132,255,.5);display:flex;align-items:center;justify-content:center;transition:transform .15s}

.sbg{position:fixed;inset:0;z-index:1000;background:var(--ov);display:flex;align-items:flex-end;justify-content:center;animation:fi .2s}
.sht{background:var(--sheet);width:100%;max-width:600px;border-radius:16px 16px 0 0;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;animation:su .4s cubic-bezier(.32,.72,0,1)}
.sht-bar{display:flex;justify-content:center;padding:8px 0 4px}

.sht-hd button{background:none;border:none;color:var(--blue);font-size:17px;cursor:pointer;min-width:64px;padding:4px 0}
.sht-hd .sv{font-weight:600;text-align:right}
.sht-hd .sv:disabled{color:var(--lbl4);cursor:default}
.sht-hd .tt{font-size:17px;font-weight:600;letter-spacing:-.2px}
.sht-ct{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 0 24px}
.dh{padding:4px 16px 20px}
.dh h2{font-size:24px;font-weight:700;letter-spacing:-.4px;line-height:1.25;margin-bottom:8px}
.dh p{font-size:15px;color:var(--lbl2);line-height:1.5;margin-bottom:0}
.badge{background:var(--red);color:#fff;border-radius:10px;font-size:11.5px;font-weight:600;min-width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;padding:0 7px;letter-spacing:.1px}
.pbar{height:6px;background:var(--fill);border-radius:3px;overflow:hidden}
.pbar-f{height:100%;background:var(--green);border-radius:3px;transition:width .4s}
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:600;flex-shrink:0;letter-spacing:-.3px}
.chk{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:14px;padding:0;transition:all .15s}
.chk-off{border:2px solid var(--lbl4);background:transparent;color:transparent}
.chk-on{border:none;background:var(--green);color:#fff}
.chk:active{transform:scale(.9)}
.sub-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:.5px solid var(--sep);transition:background .1s}
.sub-row:last-child{border-bottom:none}
.sub-row .sub-text{flex:1;font-size:16px;line-height:1.35}
.sub-row.done .sub-text{color:var(--lbl3);text-decoration:line-through}
.del-btn{background:none;border:none;color:var(--red);font-size:22px;cursor:pointer;padding:0 6px;line-height:1}
.toggle{width:51px;height:31px;border-radius:16px;padding:2px;cursor:pointer;transition:background .25s;flex-shrink:0}
.toggle-k{width:27px;height:27px;border-radius:50%;background:#fff;transition:transform .25s;box-shadow:0 2px 4px rgba(0,0,0,.2)}
.conn{display:flex;align-items:center;gap:6px;font-size:12px;padding:0 16px 8px;font-weight:500}
.conn-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.empty{padding:48px 24px;text-align:center;color:var(--lbl3)}
.empty-ic{font-size:52px;margin-bottom:12px;opacity:.6}
.empty-t{font-size:17px;font-weight:600;color:var(--lbl2);margin-bottom:6px}
.empty-s{font-size:14px;color:var(--lbl3)}
.search{display:flex;align-items:center;gap:8px;background:var(--fill);border-radius:10px;padding:8px 12px;margin-bottom:10px}
.search input{font-size:17px;width:100%;color:var(--lbl)}
.search .ic{color:var(--lbl3);font-size:15px}
.search .cl-btn{background:var(--fill2);border:none;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--lbl3);font-size:11px;flex-shrink:0}
.btn-p{width:100%;padding:14px;border-radius:11px;border:none;background:var(--blue);color:#fff;font-size:17px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-p:active{transform:scale(.98)}
.btn-p:disabled{background:var(--fill);color:var(--lbl4);cursor:default;transform:none}
.add-row{display:flex;align-items:center;gap:10px;padding:10px 16px}
.add-row input{flex:1;font-size:16px;color:var(--lbl)}
.add-row button{background:var(--blue);color:#fff;border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;font-weight:400;flex-shrink:0;transition:transform .1s}
.add-row button:active{transform:scale(.9)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
</style>

<script>
"use strict";

// Firebase Config - buraya Firebase bilgilerini gir
var FC={apiKey:"",authDomain:"",projectId:"",storageBucket:"",messagingSenderId:"",appId:""};
var db=null,fbok=false;
try{if(FC.apiKey&&FC.apiKey.length>5){firebase.initializeApp(FC);db=firebase.firestore();fbok=true}}catch(e){console.warn(e)}

var P={critical:{l:"Kritik",c:"#ff3b30",i:"🔴",s:0},high:{l:"Yüksek",c:"#ff9500",i:"🟠",s:1},medium:{l:"Orta",c:"#007aff",i:"🔵",s:2},low:{l:"Düşük",c:"#34c759",i:"🟢",s:3}};
var S={todo:{l:"Bekliyor",c:"#8e8e93",i:"○"},inprogress:{l:"Devam Ediyor",c:"#007aff",i:"◐"},review:{l:"İnceleme",c:"#af52de",i:"◑"},done:{l:"Tamamlandı",c:"#34c759",i:"●"}};
var CATS=["Sunucu & Altyapı","Veritabanı","Yazılım","Ağ & Güvenlik","Kullanıcı Destek","BDDK & Raporlama","Dijitalleşme","Diğer"];
var CAT_IC={"Sunucu & Altyapı":"🖥️","Veritabanı":"🗄️","Yazılım":"💻","Ağ & Güvenlik":"🔒","Kullanıcı Destek":"🎧","BDDK & Raporlama":"📊","Dijitalleşme":"🚀","Diğer":"📌"};

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function lg(k,f){try{var v=localStorage.getItem(k);return v?JSON.parse(v):f}catch(e){return f}}
function ls(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function fd(d){if(!d)return"";try{return new Date(d).toLocaleDateString("tr-TR",{day:"numeric",month:"short"})}catch(e){return""}}
function fl(d){if(!d)return"";try{return new Date(d).toLocaleDateString("tr-TR",{day:"numeric",month:"long",year:"numeric",weekday:"long"})}catch(e){return""}}
function dl(d){if(!d)return null;var t=new Date();t.setHours(0,0,0,0);var x=new Date(d);x.setHours(0,0,0,0);return Math.ceil((x-t)/864e5)}
function rd(d){var x=dl(d);if(x===null)return"";if(x<-1)return Math.abs(x)+" gün gecikmiş";if(x===-1)return"Dün gecikti";if(x===0)return"Bugün";if(x===1)return"Yarın";if(x<=7)return x+" gün kaldı";return fd(d)}
function esc(s){if(s===null||s===undefined)return"";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML}
function abg(n){var h=0;for(var i=0;i<n.length;i++)h+=n.charCodeAt(i);h%=360;return"linear-gradient(135deg,hsl("+h+",55%,55%),hsl("+((h+40)%360)+",60%,45%))"}
function ini(n){var p=n.split(" ");if(p.length>=2)return(p[0][0]+p[p.length-1][0]).toUpperCase();return n.slice(0,2).toUpperCase()}
function avH(n,z){z=z||32;return'<div class="av" style="width:'+z+'px;height:'+z+'px;font-size:'+Math.round(z*.38)+'px;background:'+abg(n)+'">'+esc(ini(n))+'</div>'}
function ringH(pct,z,sw,cl,bg){z=z||24;sw=sw||3;cl=cl||"var(--blue)";bg=bg||"var(--fill)";var r=(z-sw)/2,c=2*Math.PI*r;return'<svg width="'+z+'" height="'+z+'" style="transform:rotate(-90deg);display:block"><circle cx="'+(z/2)+'" cy="'+(z/2)+'" r="'+r+'" fill="none" stroke="'+bg+'" stroke-width="'+sw+'"/><circle cx="'+(z/2)+'" cy="'+(z/2)+'" r="'+r+'" fill="none" stroke="'+cl+'" stroke-width="'+sw+'" stroke-dasharray="'+c+'" stroke-dashoffset="'+(c*(1-pct))+'" stroke-linecap="round" style="transition:stroke-dashoffset .4s"/></svg>'}

var tasks=lg("hfit-tasks",[
{id:"s1",title:"BDDK Aylık Rapor Hazırlığı",description:"Regülatif raporların kontrolü ve BDDK portalına yüklenmesi",priority:"critical",status:"inprogress",category:"BDDK & Raporlama",assignee:"1",dueDate:"2026-04-22",createdAt:new Date().toISOString(),subtasks:[{id:"a1",text:"Verilerin doğrulanması",done:true},{id:"a2",text:"Rapor formatının kontrolü",done:false},{id:"a3",text:"BDDK portalına yükleme",done:false}]},
{id:"s2",title:"SQL Server Yedekleme Kontrolü",description:"dbfactoring ve dbfactoring_log veritabanlarının yedekleme doğrulaması",priority:"high",status:"todo",category:"Veritabanı",assignee:"1",dueDate:"2026-04-21",createdAt:new Date().toISOString(),subtasks:[]},
{id:"s3",title:"Mobil Uygulama Test Senaryoları",description:"QR → Infact → RatingPro → PowerCurve akışının test ortamında doğrulanması",priority:"high",status:"review",category:"Yazılım",assignee:"1",dueDate:"2026-04-25",createdAt:new Date().toISOString(),subtasks:[{id:"b1",text:"QR scan testi",done:true},{id:"b2",text:"RatingPro entegrasyonu",done:true},{id:"b3",text:"PowerCurve karar motoru",done:false}]},
{id:"s4",title:"Hyper-V Cluster Bakımı",description:"Sanal sunucuların performans kontrolü ve firmware güncellemeleri",priority:"medium",status:"todo",category:"Sunucu & Altyapı",assignee:"",dueDate:"2026-04-28",createdAt:new Date().toISOString(),subtasks:[]},
{id:"s5",title:"Dijital Mizan Nihai Rapor",description:"Prometeia projesi kapanış belgelerinin tamamlanması",priority:"low",status:"done",category:"Dijitalleşme",assignee:"1",dueDate:"2026-04-15",createdAt:new Date().toISOString(),subtasks:[]},
{id:"s6",title:"E-Defter Tebliği Uyum",description:"1 Temmuz 2025 tebliği kapsamında gerekli aksiyonların planlanması",priority:"medium",status:"inprogress",category:"Dijitalleşme",assignee:"1",dueDate:"2026-05-01",createdAt:new Date().toISOString(),subtasks:[{id:"c1",text:"Tebliğ gereksinimlerinin analizi",done:true},{id:"c2",text:"BIS Infact entegrasyonu",done:false}]},
{id:"s7",title:"Veeam v13 Lisans Yenileme",description:"Eylül 2026 öncesi Veeam Instance lisanslarının yenilenmesi",priority:"medium",status:"todo",category:"Sunucu & Altyapı",assignee:"",dueDate:"2026-09-15",createdAt:new Date().toISOString(),subtasks:[]}
]);
var team=lg("hfit-team",[{id:"1",name:"Cengiz Gülcan",role:"IT Yönetici"}]);
var tab="dash",dark=lg("hfit-dark",false),sfilt="all",formData=null;

function sv(){ls("hfit-tasks",tasks);ls("hfit-team",team)}
function fm(id){if(!id)return null;for(var i=0;i<team.length;i++)if(team[i].id===id)return team[i];return null}
function findTask(id){for(var i=0;i<tasks.length;i++)if(tasks[i].id===id)return tasks[i];return null}
function gs(){var o={total:tasks.length,todo:0,ip:0,rv:0,done:0,ov:0,today:0};tasks.forEach(function(t){if(t.status==="todo")o.todo++;if(t.status==="inprogress")o.ip++;if(t.status==="review")o.rv++;if(t.status==="done")o.done++;var d=dl(t.dueDate);if(d!==null&&d<0&&t.status!=="done")o.ov++;if(d===0&&t.status!=="done")o.today++});o.pct=o.total?Math.round(o.done/o.total*100):0;o.active=o.total-o.done;return o}

function trowH(t){
var p=P[t.priority]||P.medium,s=S[t.status]||S.todo;
var d=dl(t.dueDate),a=fm(t.assignee);
var su=t.subtasks||[],sd=su.filter(function(x){return x.done}).length,st=su.length;
var dc=d!==null&&d<0?"var(--red)":d!==null&&d<=2?"var(--orange)":"var(--lbl3)";
var h='<div class="trow" data-action="detail" data-id="'+esc(t.id)+'">';
h+='<div class="trow-bar" style="background:'+p.c+'"></div>';
h+='<div class="trow-body">';
h+='<div class="trow-title" style="'+(t.status==="done"?"color:var(--lbl3);text-decoration:line-through":"")+'">'+esc(t.title)+'</div>';
h+='<div class="trow-meta">';
h+='<span class="trow-chip" style="color:'+s.c+'">'+s.i+" "+esc(s.l)+'</span>';

h+=’<div style="padding:14px 16px"><button class="btn-p" data-action="add-member">Üye Ekle</button></div>’;
h+=’</div></div>’;
h+=’</div></div></div>’;
document.getElementById(“sroot”).innerHTML=h;
setTimeout(function(){var inp=document.getElementById(“tmn”);if(inp)inp.focus()},100);
}

function syncForm(){
if(!formData)return;
var el;
el=document.getElementById(“ft”);if(el)formData.title=el.value;
el=document.getElementById(“fd”);if(el)formData.description=el.value;
el=document.getElementById(“fp”);if(el)formData.priority=el.value;
el=document.getElementById(“fs”);if(el)formData.status=el.value;
el=document.getElementById(“fc”);if(el)formData.category=el.value;
el=document.getElementById(“fa”);if(el)formData.assignee=el.value;
el=document.getElementById(“fdt”);if(el)formData.dueDate=el.value;
}

function exportData(){
var data={tasks:tasks,team:team,exportDate:new Date().toISOString()};
var blob=new Blob([JSON.stringify(data,null,2)],{type:“application/json”});
var url=URL.createObjectURL(blob);
var a=document.createElement(“a”);a.href=url;a.download=“hfit-gorev-yedek-”+new Date().toISOString().slice(0,10)+”.json”;
document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function syncToFB(t){
if(!fbok||!db)return;
var data={};
Object.keys(t).forEach(function(k){if(k!==“id”)data[k]=t[k]});
db.collection(“tasks”).doc(t.id).set(data).catch(function(e){console.error(e)});
}

document.addEventListener(“click”,function(e){
var el=e.target.closest(”[data-action]”);
if(!el)return;
var act=el.getAttribute(“data-action”);
var id=el.getAttribute(“data-id”);
var val=el.getAttribute(“data-val”);

// Close-sheet: only if clicked on backdrop directly OR on close button
if(act===“close-sheet”){
if(el.classList.contains(“sbg”)||el.tagName===“BUTTON”){closeSheet()}
return;
}

switch(act){
case”tab”:tab=val;sfilt=“all”;render();var c=document.getElementById(“content”);if(c)c.scrollTop=0;break;
case”new-task”:openForm(null);break;
case”toggle-dark”:dark=!dark;ls(“hfit-dark”,dark);render();break;
case”detail”:openDetail(id);break;
case”edit-task”:closeSheet();setTimeout(function(){openForm(id)},50);break;
case”change-status”:
var tt=findTask(id);
if(tt){tt.status=val;sv();if(fbok)syncToFB(tt);openDetail(id);render()}
break;
case”toggle-sub”:
var tid=el.getAttribute(“data-tid”),sid=el.getAttribute(“data-sid”);
var tsk=findTask(tid);
if(tsk){(tsk.subtasks||[]).forEach(function(s){if(s.id===sid)s.done=!s.done});sv();if(fbok)syncToFB(tsk);openDetail(tid);render()}
break;
case”delete-task”:
if(!confirm(“Bu görevi silmek istediğine emin misin?”))return;
if(fbok&&db)db.collection(“tasks”).doc(id).delete().catch(function(e){console.error(e)});
tasks=tasks.filter(function(t){return t.id!==id});sv();closeSheet();render();
break;
case”save-task”:
syncForm();if(!formData||!formData.title.trim())return;
if(formData.id){
var idx=-1;tasks.forEach(function(t,i){if(t.id===formData.id)idx=i});
if(idx>=0)tasks[idx]=formData;
if(fbok)syncToFB(formData);
}else{
formData.id=uid();
formData.createdAt=new Date().toISOString();
tasks.unshift(formData);
if(fbok)syncToFB(formData);
}
sv();closeSheet();render();
break;
case”form-toggle-sub”:
syncForm();var fi=parseInt(el.getAttribute(“data-idx”));
if(formData&&formData.subtasks[fi])formData.subtasks[fi].done=!formData.subtasks[fi].done;
openForm(formData.id||null);
break;
case”form-del-sub”:
syncForm();var di=parseInt(el.getAttribute(“data-idx”));
if(formData)formData.subtasks.splice(di,1);
openForm(formData.id||null);
break;
case”form-add-sub”:
syncForm();var ns=document.getElementById(“fns”);
if(ns&&ns.value.trim()){formData.subtasks.push({id:uid(),text:ns.value.trim(),done:false});openForm(formData.id||null);setTimeout(function(){var n=document.getElementById(“fns”);if(n)n.focus()},50)}
break;
case”filter-status”:
sfilt=val;
document.querySelectorAll(”#sseg button”).forEach(function(b){b.classList.toggle(“active”,b.getAttribute(“data-val”)===val)});
doFilter();
break;
case”clear-search”:
var qi=document.getElementById(“qinp”);if(qi){qi.value=””;doFilter();el.style.display=“none”}
break;
case”team-sheet”:openTeam();break;
case”add-member”:
var mn=document.getElementById(“tmn”),mr=document.getElementById(“tmr”);
if(mn&&mn.value.trim()){
var newM={id:uid(),name:mn.value.trim(),role:(mr?mr.value.trim():””)||“Ekip Üyesi”};
team.push(newM);
if(fbok&&db)db.collection(“team”).doc(newM.id).set({name:newM.name,role:newM.role}).catch(function(e){console.error(e)});
sv();openTeam();render();
}
break;
case”del-member”:
if(!confirm(“Bu üyeyi silmek istediğine emin misin?”))return;
if(fbok&&db)db.collection(“team”).doc(id).delete().catch(function(e){console.error(e)});
team=team.filter(function(m){return m.id!==id});sv();openTeam();render();
break;
case”export”:exportData();break;
case”reset”:
if(!confirm(“Tüm görevler ve ekip bilgileri silinecek. Emin misin?”))return;
if(!confirm(“Bu işlem geri alınamaz. Gerçekten devam edelim mi?”))return;
tasks=[];team=[{id:“1”,name:“Cengiz Gülcan”,role:“IT Yönetici”}];sv();render();
break;
}
});

if(fbok){
db.collection(“tasks”).onSnapshot(function(snap){
var r=[];
snap.forEach(function(d){var x=d.data();if(x.createdAt&&x.createdAt.toDate)x.createdAt=x.createdAt.toDate().toISOString();r.push(Object.assign({id:d.id},x))});
if(r.length){tasks=r.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt)});sv();render()}
});
db.collection(“team”).onSnapshot(function(snap){
var r=[];snap.forEach(function(d){r.push(Object.assign({id:d.id},d.data()))});
if(r.length){team=r;sv();render()}
});
}

render();
console.log(“HF IT v3.0 loaded, fbok:”,fbok);
</script>
