<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Görev Takip Paneli - Canlı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { navy: '#1a2c5b', darknavy: '#0f172a', graylight: '#f8fafc' } } }
        }
    </script>
    <style>
        .sortable-ghost { opacity: 0.4; background-color: #f1f5f9; border: 2px dashed #cbd5e1; }
        .task-card { cursor: grab; }
        .task-card:active { cursor: grabbing; }
        /* Modal gizleme/gösterme sınıfı */
        .modal-hidden { display: none; }
    </style>
</head>
<body class="bg-graylight font-sans text-gray-800 h-screen flex flex-col overflow-hidden relative">
    
    <header class="bg-navy text-white p-4 shadow-lg flex justify-between items-center z-10">
        <h1 class="text-xl font-extrabold tracking-widest text-gray-100">IT GÖREV <span class="text-blue-300">PRO</span></h1>
        <div class="flex items-center gap-4">
            <button id="open-modal-btn" class="bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold py-1.5 px-4 rounded-md shadow flex items-center gap-1 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Yeni Görev
            </button>
            <div class="w-8 h-8 rounded-full bg-gray-200 text-navy font-bold flex items-center justify-center shadow-sm">C</div>
        </div>
    </header>

    <main class="flex-1 overflow-x-auto p-6 bg-gray-100 flex gap-6 min-w-max h-full">
        <div class="bg-gray-200/60 rounded-xl w-80 flex flex-col border border-gray-300">
            <div class="p-3 border-b border-gray-300 bg-gray-200/80 rounded-t-xl font-bold text-darknavy">YAPILACAKLAR</div>
            <div id="todo" class="kanban-column p-3 flex-1 overflow-y-auto flex flex-col gap-3 min-h-[200px]" data-status="todo"></div>
        </div>

        <div class="bg-blue-50/50 rounded-xl w-80 flex flex-col border border-blue-200">
            <div class="p-3 border-b border-blue-200 bg-blue-100/50 rounded-t-xl font-bold text-blue-800">DEVAM EDENLER</div>
            <div id="inprogress" class="kanban-column p-3 flex-1 overflow-y-auto flex flex-col gap-3 min-h-[200px]" data-status="inprogress"></div>
        </div>

        <div class="bg-green-50/50 rounded-xl w-80 flex flex-col border border-green-200">
            <div class="p-3 border-b border-green-200 bg-green-100/50 rounded-t-xl font-bold text-green-800">TAMAMLANDI</div>
            <div id="done" class="kanban-column p-3 flex-1 overflow-y-auto flex flex-col gap-3 min-h-[200px]" data-status="done"></div>
        </div>
    </main>

    <div id="task-modal" class="modal-hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-lg shadow-xl w-96">
            <h2 class="text-xl font-bold mb-4 text-navy">Yeni Görev Tanımla</h2>
            <form id="task-form" class="space-y-3">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Başlık</label>
                    <input type="text" id="task-title" required class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-navy">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Açıklama (İsteğe Bağlı)</label>
                    <textarea id="task-desc" rows="2" class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-navy"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">İlgili Proje</label>
                    <select id="task-project" class="mt-1 w-full p-2 border rounded">
                        <option value="BIS Infact">BIS Infact</option>
                        <option value="Dijital Mizan">Dijital Mizan</option>
                        <option value="RatingPro">RatingPro</option>
                        <option value="Karar Destek Sistemi">Karar Destek Sistemi</option>
                        <option value="Diğer / Altyapı">Diğer / Altyapı</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Öncelik</label>
                    <select id="task-priority" class="mt-1 w-full p-2 border rounded">
                        <option value="Normal">Normal</option>
                        <option value="Acil">Acil</option>
                    </select>
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="button" id="close-modal-btn" class="w-1/2 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 rounded">İptal</button>
                    <button type="submit" class="w-1/2 bg-navy hover:bg-blue-800 text-white font-bold py-2 rounded">Kaydet</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        // 1. Firebase Modüllerini İçe Aktar
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // ==========================================
        // BURAYA KENDİ FIREBASE BİLGİLERİNİZİ YAPIŞTIRIN
        // ==========================================
        const firebaseConfig = {
            apiKey: "API_ANAHTARI",
            authDomain: "PROJE.firebaseapp.com",
            projectId: "PROJE_ID",
            storageBucket: "PROJE.appspot.com",
            messagingSenderId: "SENDER_ID",
            appId: "APP_ID"
        };

        // Firebase Başlatma
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // DOM Elementleri
        const columns = {
            'todo': document.getElementById('todo'),
            'inprogress': document.getElementById('inprogress'),
            'done': document.getElementById('done')
        };
        const modal = document.getElementById('task-modal');
        const taskForm = document.getElementById('task-form');

        // Modal Aç/Kapat Mantığı
        document.getElementById('open-modal-btn').addEventListener('click', () => modal.classList.remove('modal-hidden'));
        document.getElementById('close-modal-btn').addEventListener('click', () => { modal.classList.add('modal-hidden'); taskForm.reset(); });

        // 2. Yeni Görev Ekleme (Create)
        taskForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('task-title').value;
            const desc = document.getElementById('task-desc').value;
            const project = document.getElementById('task-project').value;
            const priority = document.getElementById('task-priority').value;

            try {
                await addDoc(collection(db, "tasks"), {
                    title: title, desc: desc, project: project, priority: priority,
                    status: "todo", // Varsayılan olarak Yapılacaklar'a düşer
                    createdAt: new Date().getTime()
                });
                modal.classList.add('modal-hidden');
                taskForm.reset();
            } catch (error) { console.error("Hata:", error); alert("Veritabanına bağlanılamadı!"); }
        });

        // 3. Verileri Gerçek Zamanlı Okuma (Read)
        const q = query(collection(db, "tasks"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            // Sütunları temizle
            Object.values(columns).forEach(col => col.innerHTML = '');

            snapshot.forEach((doc) => {
                const task = doc.data();
                const taskId = doc.id;
                
                // Önceliğe göre rozet rengi
                const badgeClass = task.priority === 'Acil' ? 'bg-red-100 text-red-700 border-red-200' : 'bg-blue-50 text-blue-600 border-blue-100';

                // Kart HTML'i oluştur
                const cardHTML = `
                    <div class="task-card bg-white p-4 rounded-lg shadow-sm border border-gray-200" data-id="${taskId}">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-bold px-2 py-1 rounded uppercase border ${badgeClass}">${task.priority}</span>
                        </div>
                        <h3 class="font-semibold text-gray-800 mb-1">${task.title}</h3>
                        <p class="text-sm text-gray-500 mb-3 line-clamp-2">${task.desc}</p>
                        <div class="flex justify-between items-center pt-2 border-t border-gray-100">
                            <span class="text-xs font-medium text-navy bg-blue-50 px-2 py-1 rounded">${task.project}</span>
                        </div>
                    </div>
                `;

                // Görevin statüsüne (todo, inprogress, done) göre ilgili sütuna ekle
                if (columns[task.status]) {
                    columns[task.status].innerHTML += cardHTML;
                }
            });
        });

        // 4. Sürükle-Bırak İşlemi ve Veritabanı Güncelleme (Update)
        Object.values(columns).forEach(column => {
            new Sortable(column, {
                group: 'shared',
                animation: 150,
                ghostClass: 'sortable-ghost',
                onEnd: async function (evt) {
                    const itemEl = evt.item;  // Sürüklenen kart
                    const toList = evt.to;    // Bırakılan sütun
                    
                    const taskId = itemEl.getAttribute('data-id');
                    const newStatus = toList.getAttribute('data-status'); // 'todo', 'inprogress' veya 'done'

                    // Firebase'de sadece bu görevin 'status' alanını güncelle
                    if (taskId && newStatus) {
                        try {
                            await updateDoc(doc(db, "tasks", taskId), { status: newStatus });
                        } catch (error) {
                            console.error("Güncelleme hatası: ", error);
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
