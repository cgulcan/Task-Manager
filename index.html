<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Görev Takip Paneli - Pro v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    colors: { 
                        navy: '#1a2c5b', 
                        darknavy: '#0f172a', 
                        graylight: '#f8fafc',
                        grayborder: '#e2e8f0'
                    } 
                }
            }
        }
    </script>
    <style>
        .sortable-ghost { opacity: 0.4; background-color: #f1f5f9; border: 2px dashed #cbd5e1; }
        .task-card { cursor: grab; transition: all 0.2s ease; }
        .task-card:active { cursor: grabbing; }
        /* Scrollbar tasarımı */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-graylight font-sans text-gray-800 h-screen flex flex-col overflow-hidden">
    
    <header class="bg-navy text-white p-4 shadow-lg flex justify-between items-center z-10">
        <div class="flex items-center gap-6">
            <h1 class="text-xl font-extrabold tracking-widest text-gray-100">IT GÖREV <span class="text-blue-300">PRO</span></h1>
            <div class="hidden md:block relative">
                <input type="text" id="searchInput" placeholder="Görev ara..." class="bg-darknavy text-sm text-white placeholder-gray-400 rounded-full pl-4 pr-10 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-400 w-64 border border-gray-600 transition-all">
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold py-1.5 px-4 rounded-md shadow transition-all flex items-center gap-1 active:scale-95">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Yeni Görev
            </button>
            <div class="w-8 h-8 rounded-full bg-gray-200 text-navy font-bold flex items-center justify-center border-2 border-blue-400">C</div>
        </div>
    </header>

    <main class="flex-1 overflow-x-auto p-6 bg-gray-100">
        <div class="flex gap-6 min-w-max h-full">
            
            <div class="bg-gray-200/60 rounded-xl w-80 flex flex-col border border-grayborder shadow-sm">
                <div class="p-4 border-b border-gray-300 flex justify-between items-center bg-gray-200/80 rounded-t-xl">
                    <h2 class="font-bold text-darknavy flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-gray-500"></div> YAPILACAKLAR 
                    </h2>
                    <span id="todo-count" class="bg-white text-gray-700 px-2.5 py-0.5 rounded-full text-xs font-bold shadow-sm">0</span>
                </div>
                <div id="todo-list" class="p-3 flex-1 overflow-y-auto flex flex-col gap-3 min-h-[150px]"></div>
            </div>

            <div class="bg-blue-50/50 rounded-xl w-80 flex flex-col border border-blue-100 shadow-sm">
                <div class="p-4 border-b border-blue-200 flex justify-between items-center bg-blue-100/50 rounded-t-xl">
                    <h2 class="font-bold text-blue-800 flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div> DEVAM EDENLER 
                    </h2>
                    <span id="inprogress-count" class="bg-white text-blue-800 px-2.5 py-0.5 rounded-full text-xs font-bold shadow-sm">0</span>
                </div>
                <div id="inprogress-list" class="p-3 flex-1 overflow-y-auto flex flex-col gap-3 min-h-[150px]"></div>
            </div>

            <div class="bg-green-50/50 rounded-xl w-80 flex flex-col border border-green-100 shadow-sm">
                <div class="p-4 border-b border-green-200 flex justify-between items-center bg-green-100/50 rounded-t-xl">
                    <h2 class="font-bold text-green-800 flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-green-500"></div> TAMAMLANDI 
                    </h2>
                    <span id="done-count" class="bg-white text-green-800 px-2.5 py-0.5 rounded-full text-xs font-bold shadow-sm">0</span>
                </div>
                <div id="done-list" class="p-3 flex-1 overflow-y-auto flex flex-col gap-3 min-h-[150px]"></div>
            </div>

        </div>
    </main>

    <div id="taskModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 w-96 shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-navy">Yeni Görev Ekle</h2>
            <div class="space-y-4">
                <input type="text" id="taskTitle" placeholder="Görev Başlığı" class="w-full border p-2 rounded-md outline-blue-500">
                <textarea id="taskDesc" placeholder="Görev Açıklaması" class="w-full border p-2 rounded-md outline-blue-500"></textarea>
                <select id="taskProject" class="w-full border p-2 rounded-md outline-blue-500">
                    <option>Dijital Mizan</option>
                    <option>BIS Infact</option>
                    <option>Karar Destek</option>
                </select>
                <div class="flex justify-end gap-2">
                    <button onclick="closeModal()" class="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded-md">İptal</button>
                    <button onclick="addTask()" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Ekle</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const todoList = document.getElementById('todo-list');
        const inProgressList = document.getElementById('inprogress-list');
        const doneList = document.getElementById('done-list');

        // Sayılar güncelleyen fonksiyon
        function updateCounts() {
            document.getElementById('todo-count').innerText = todoList.children.length;
            document.getElementById('inprogress-count').innerText = inProgressList.children.length;
            document.getElementById('done-count').innerText = doneList.children.length;
            saveTasks();
        }

        // Modal Fonksiyonları
        function openModal() { document.getElementById('taskModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('taskModal').classList.add('hidden'); }

        // Görev Ekleme
        function addTask() {
            const title = document.getElementById('taskTitle').value;
            const desc = document.getElementById('taskDesc').value;
            const project = document.getElementById('taskProject').value;

            if(!title) return alert("Başlık boş olamaz!");

            const taskHtml = createTaskCard(title, desc, project, "Normal", "#" + Math.floor(Math.random()*1000));
            todoList.insertAdjacentHTML('afterbegin', taskHtml);
            
            updateCounts();
            closeModal();
            // Formu temizle
            document.getElementById('taskTitle').value = "";
            document.getElementById('taskDesc').value = "";
        }

        function createTaskCard(title, desc, project, priority, id) {
            return `
                <div class="task-card bg-white p-4 rounded-lg shadow-sm border border-gray-200 hover:shadow-md transition-all">
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-[10px] font-bold bg-blue-50 text-blue-600 px-2 py-1 rounded uppercase border border-blue-100">${priority}</span>
                        <span class="text-xs text-gray-400 font-mono">${id}</span>
                    </div>
                    <h3 class="font-semibold text-gray-800 mb-2 leading-tight">${title}</h3>
                    <p class="text-sm text-gray-500 mb-4 line-clamp-2">${desc}</p>
                    <div class="flex justify-between items-center pt-2 border-t border-gray-100">
                        <span class="text-xs font-medium text-navy bg-blue-50 px-2 py-1 rounded">${project}</span>
                        <button onclick="this.parentElement.parentElement.remove(); updateCounts();" class="text-gray-400 hover:text-red-500 text-xs">Sil</button>
                    </div>
                </div>`;
        }

        // Sortable Başlatma
        const sortableOptions = {
            group: 'shared',
            animation: 150,
            ghostClass: 'sortable-ghost',
            onEnd: updateCounts
        };

        new Sortable(todoList, sortableOptions);
        new Sortable(inProgressList, sortableOptions);
        new Sortable(doneList, sortableOptions);

        // LocalStorage Kayıt (Basit Versiyon)
        function saveTasks() {
            const data = {
                todo: todoList.innerHTML,
                inprogress: inProgressList.innerHTML,
                done: doneList.innerHTML
            };
            localStorage.setItem('it-task-data', JSON.stringify(data));
        }

        // Verileri Geri Yükleme
        window.onload = () => {
            const saved = localStorage.getItem('it-task-data');
            if(saved) {
                const data = JSON.parse(saved);
                todoList.innerHTML = data.todo;
                inProgressList.innerHTML = data.inprogress;
                doneList.innerHTML = data.done;
                updateCounts();
            }
        };
    </script>
</body>
</html>
