// Firestore helpers
function fbSub(col, orderField, cb) {
  if (!fbOK) return function(){};
  return db.collection(col).orderBy(orderField, "desc").onSnapshot(
    function(snap) {
      var items = [];
      snap.forEach(function(doc) {
        var d = doc.data();
        var ca = d.createdAt;
        if (ca && ca.toDate) ca = ca.toDate().toISOString();
        items.push(Object.assign({}, d, { id: doc.id, createdAt: ca }));
      });
      cb(items);
    },
    function(err) { console.error("Firestore:", err); }
  );
}
function fbAdd(col, data) {
  if (!fbOK) return Promise.resolve(null);
  var d = Object.assign({}, data);
  delete d.id;
  d.createdAt = firebase.firestore.FieldValue.serverTimestamp();
  d.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
  return db.collection(col).add(d).then(function(ref) { return ref.id; });
}
function fbUp(col, did, data) {
  if (!fbOK) return Promise.resolve();
  var d = Object.assign({}, data);
  delete d.id;
  d.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
  return db.collection(col).doc(did).update(d);
}
function fbDel(col, did) {
  if (!fbOK) return Promise.resolve();
  return db.collection(col).doc(did).delete();
}

function relD(d) {
  var dl = dLeft(d);
  if (dl === null) return "";
  if (dl < -1) return Math.abs(dl) + " g\u00FCn gecikmi\u015F";
  if (dl === -1) return "D\u00FCn";

}

      if(t.length)setTeam(t);

      if(fbOK) fbDel("tasks",tid);
      setTasks(function(p){return p.filter(function(t){return t.id!==tid})});
      setSheet(null);return;
    }
    if(fbOK){
      var existing=false;
      tasks.forEach(function(t){if(t.id===fd.id)existing=true});
      if(existing){
        fbUp("tasks",fd.id,fd);
        setTasks(function(p){return p.map(function(t){return t.id===fd.id?Object.assign({},t,fd):t})});
      } else {
        fbAdd("tasks",fd).then(function(nid){
          setTasks(function(p){return [Object.assign({},fd,{id:nid||uid()})].concat(p)});
        });
      }
    } else {
      setTasks(function(p){
        var i=-1;p.forEach(function(t,idx){if(t.id===fd.id)i=idx});
        if(i>=0){var n=p.slice();n[i]=fd;return n}
        return [Object.assign({},fd,{id:uid()})].concat(p);

    setSheet(null);

    else{setTeam(function(p){return p.concat([Object.assign({},m,{id:uid()})])})}
