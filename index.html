
  <div id="sheet-root"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
"use strict";


var FIREBASE_CONFIG = { apiKey:"", authDomain:"", projectId:"", storageBucket:"", messagingSenderId:"", appId:"" };
var db = null, fbok = false, cloudReady = false, blockCloudSave = false;
try {
  if (FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.projectId && window.firebase) {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    fbok = true;
  }
} catch(e) { console.warn(e); }

function loadScript(src) {
  return new Promise(function(resolve, reject) {
    var script = document.createElement("script");
    script.src = src;
    script.onload = resolve;
    script.onerror = reject;
    document.head.appendChild(script);
  });
}
function startFirebase() {
  if (!FIREBASE_CONFIG.apiKey || !FIREBASE_CONFIG.projectId) return;
  loadScript("https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js")
    .then(function() { return loadScript("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"); })
    .then(function() {
      firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.firestore();
      fbok = true;
      initCloud();
      render();
    })
    .catch(function(error) {
      console.warn("Firebase yüklenemedi, yerel modda devam ediliyor:", error);
      fbok = false;
      cloudReady = false;
      render();
    });
}

var PRIORITIES = {
  critical: { label:"Kritik", rank:0 },
  high: { label:"Yüksek", rank:1 },
  }
});
render();
initCloud();
startFirebase();
</script>
</body>
</html>
