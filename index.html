:root {

  --line: #dce4e0;
  --field: #f1f5f3;
  --accent: #008c7a;
  --accent-2: #0fb8a0;
  --danger: #d83a34;
  --warn: #d58a00;
  --info: #147fb5;
  --ok: #238b45;

}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100dvh; overflow: hidden; }
body {

  -webkit-user-select: none;
}
button, input, textarea, select { border: 0; outline: 0; background: transparent; color: inherit; font: inherit; }
button, select, label { cursor: pointer; }
svg { display: block; }
.app {

  height: 100dvh;
  margin: 0 auto;
  display: grid;
  grid-template-rows: auto 1fr;
  position: relative;

.topbar {

  padding: max(14px, env(safe-area-inset-top)) 18px 12px;

.eyebrow { color: var(--muted); font-size: 11px; font-weight: 800; letter-spacing: 1.4px; text-transform: uppercase; }
.title { margin-top: 2px; font-size: clamp(23px, 4vw, 31px); line-height: 1.05; font-weight: 850; letter-spacing: -0.03em; }
.top-actions { display: flex; align-items: center; gap: 10px; }
.icon-btn, .avatar, .mini-btn {

  min-width: 42px;

  background: color-mix(in srgb, var(--panel) 82%, transparent);
  border: 1px solid var(--line);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 850;
}

.avatar { color: #fff; border: 0; }
.mini-btn { padding: 0 13px; gap: 8px; color: var(--accent); }
