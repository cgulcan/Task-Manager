<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Görev Takip Paneli - Pro v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    colors: { 
                        navy: '#1a2c5b', 
                        darknavy: '#0f172a', 
                        graylight: '#f8fafc',
                        grayborder: '#e2e8f0'
                    } 
                }
            }
        }
    </script>
    <style>
        .sortable-ghost { opacity: 0.2; transform: scale(0.9); }
        .sortable-drag { cursor: grabbing !important; transform: rotate(2deg); }
        .task-card { cursor: grab; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .task-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        /* Animasyonlar */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-graylight font-sans text-gray-800 h-screen flex flex-col overflow-hidden">
    
    <header class="bg-navy text-white p-4 shadow-lg flex justify-between items-center z-20">
        <div class="flex items-center gap-6">
            <h1 class="text-xl font-extrabold tracking-widest text-gray-100">IT GÖREV <span class="text-blue-400">ULTIMATE</span></h1>
            <div class="hidden md:block relative">
                <input type="text" id="globalSearch" onkeyup="filterTasks()" placeholder="Hızlı ara (ID, Başlık, Proje)..." 
                       class="bg-darknavy text-sm text-white placeholder-gray-400 rounded-lg pl-4 pr-10 py-2 focus:ring-2 focus:ring-blue-500 w-80 border border-gray-700 transition-all">
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="toggleModal(true)" class="bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold py-2 px-5 rounded-lg shadow-lg flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                YENİ KAYIT
            </button>
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-600 to-navy text-white font-bold flex items-center justify-center border-2 border-blue-300 shadow-md">GT</div>
        </div>
    </header>

    <main class="flex-1 overflow-x-auto p-8 bg-slate-200/50">
        <div class="flex gap-8 min-w-max h-full">
            
            <div class="w-80 flex flex-col">
                <div class="flex items-center justify-between mb-4 px-2">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-gray-400"></span>
                        <h2 class="font-bold text-slate-700">YAPILACAKLAR</h2>
                    </div>
                    <span id="todo-count" class="bg-slate-300 text-slate-700 text-xs font-black px-2.5 py-1 rounded-md">0</span>
                </div>
                <div id="todo-list" data-status="todo" class="flex-1 space-y-4 rounded-xl transition-colors min-h-[100px]"></div>
            </div>

            <div class="w-80 flex flex-col">
                <div class="flex items-center justify-between mb-4 px-2">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-blue-500 animate-pulse"></span>
                        <h2 class="font-bold text-blue-900">DEVAM EDENLER</h2>
                    </div>
                    <span id="inprogress-count" class="bg-blue-200 text-blue-800 text-xs font-black px-2.5 py-1 rounded-md">0</span>
                </div>
                <div id="inprogress-list" data-status="inprogress" class="flex-1 space-y-4 rounded-xl min-h-[100px]"></div>
            </div>

            <div class="w-80 flex flex-col">
                <div class="flex items-center justify-between mb-4 px-2">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-green-500"></span>
                        <h2 class="font-bold text-green-900">TAMAMLANDI</h2>
                    </div>
                    <span id="done-count" class="bg-green-200 text-green-800 text-xs font-black px-2.5 py-1 rounded-md">0</span>
                </div>
                <div id="done-list" data-status="done" class="flex-1 space-y-4 rounded-xl min-h-[100px]"></div>
            </div>

        </div>
    </main>

    <div id="taskModal" class="hidden fixed inset-0 bg-darknavy/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl scale-in">
            <h2 class="text-2xl font-black text-navy mb-6">Yeni Görev Tanımla</h2>
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Görev Başlığı</label>
                    <input type="text" id="m_title" class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-blue-500 outline-none transition-all">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Öncelik</label>
                        <select id="m_priority" class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-blue-500 outline-none">
                            <option value="Düşük">Düşük</option>
                            <option value="Normal" selected>Normal</option>
                            <option value="Acil">Acil</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Proje</label>
                        <select id="m_project" class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-blue-500 outline-none">
                            <option>Dijital Mizan</option>
                            <option>BIS Infact</option>
                            <option>Sistem Altyapı</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Açıklama</label>
                    <textarea id="m_desc" rows="3" class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-blue-500 outline-none"></textarea>
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="toggleModal(false)" class="flex-1 py-3 font-bold text-gray-400 hover:bg-gray-50 rounded-xl transition-all">İptal</button>
                    <button onclick="saveNewTask()" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition-all">Görev Oluştur</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Veri Yapısı
        let tasks = JSON.parse(localStorage.getItem('it_pro_tasks')) || [
            { id: '#105', title: 'SQL Alert Job Revizyonu', desc: 'Loglama scripti mesai saatlerine göre ayarlanacak.', project: 'Dijital Mizan', priority: 'Acil', status: 'todo' },
            { id: '#104', title: 'Python Veri Otomasyonu', desc: 'Pandas ile veri birleştirme makroları yazılacak.', project: 'Karar Destek', priority: 'Normal', status: 'inprogress' }
        ];

        // Görevleri Render Etme
        function renderTasks() {
            const containers = {
                todo: document.getElementById('todo-list'),
                inprogress: document.getElementById('inprogress-list'),
                done: document.getElementById('done-list')
            };

            Object.values(containers).forEach(c => c.innerHTML = '');

            tasks.forEach(task => {
                const priorityStyles = {
                    'Acil': 'bg-red-100 text-red-700 border-red-200',
                    'Normal': 'bg-blue-100 text-blue-700 border-blue-200',
                    'Düşük': 'bg-gray-100 text-gray-600 border-gray-200'
                };

                const cardHtml = `
                    <div class="task-card bg-white p-5 rounded-xl border border-grayborder shadow-sm fade-in" data-id="${task.id}">
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-[10px] font-black px-2.5 py-1 rounded-md uppercase border ${priorityStyles[task.priority]}">${task.priority}</span>
                            <span class="text-[11px] text-gray-400 font-mono font-bold">${task.id}</span>
                        </div>
                        <h3 class="font-bold text-slate-800 mb-1 tracking-tight">${task.title}</h3>
                        <p class="text-xs text-slate-500 leading-relaxed mb-4">${task.desc}</p>
                        <div class="flex justify-between items-center pt-3 border-t border-slate-50">
                            <span class="text-[10px] font-bold text-navy bg-slate-100 px-2 py-1 rounded">${task.project}</span>
                            <button onclick="deleteTask('${task.id}')" class="text-slate-300 hover:text-red-500 transition-colors">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>`;
                containers[task.status].insertAdjacentHTML('beforeend', cardHtml);
            });

            updateUI();
        }

        // UI Güncellemeleri (Sayılar ve Yerel Depolama)
        function updateUI() {
            document.getElementById('todo-count').innerText = tasks.filter(t => t.status === 'todo').length;
            document.getElementById('inprogress-count').innerText = tasks.filter(t => t.status === 'inprogress').length;
            document.getElementById('done-count').innerText = tasks.filter(t => t.status === 'done').length;
            localStorage.setItem('it_pro_tasks', JSON.stringify(tasks));
        }

        // Yeni Görev Kaydetme
        function saveNewTask() {
            const newTask = {
                id: '#' + Math.floor(100 + Math.random() * 900),
                title: document.getElementById('m_title').value,
                desc: document.getElementById('m_desc').value,
                priority: document.getElementById('m_priority').value,
                project: document.getElementById('m_project').value,
                status: 'todo'
            };

            if(!newTask.title) return alert("Başlık zorunludur!");
            
            tasks.push(newTask);
            toggleModal(false);
            renderTasks();
            
            // Formu temizle
            document.getElementById('m_title').value = '';
            document.getElementById('m_desc').value = '';
        }

        // Görev Silme
        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            renderTasks();
        }

        // Arama/Filtreleme
        function filterTasks() {
            const query = document.getElementById('globalSearch').value.toLowerCase();
            const cards = document.querySelectorAll('.task-card');
            cards.forEach(card => {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(query) ? 'block' : 'none';
            });
        }

        // Modal Kontrolü
        function toggleModal(show) {
            const m = document.getElementById('taskModal');
            show ? m.classList.remove('hidden') : m.classList.add('hidden');
        }

        // Sortable JS Entegrasyonu
        const containers = ['todo-list', 'inprogress-list', 'done-list'];
        containers.forEach(id => {
            new Sortable(document.getElementById(id), {
                group: 'tasks',
                animation: 250,
                ghostClass: 'sortable-ghost',
                dragClass: 'sortable-drag',
                onEnd: function (evt) {
                    const taskId = evt.item.getAttribute('data-id');
                    const newStatus = evt.to.getAttribute('data-status');
                    
                    const taskIndex = tasks.findIndex(t => t.id === taskId);
                    tasks[taskIndex].status = newStatus;
                    
                    updateUI();
                }
            });
        });

        // İlk Yükleme
        renderTasks();
    </script>
</body>
</html>
